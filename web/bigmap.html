<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>大地图 - 实时追踪</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#0a0a12;color:#eee;overflow:hidden;
            width:100vw;height:100vh;display:flex;flex-direction:column;
        }
        .topbar{
            display:flex;align-items:center;justify-content:space-between;
            padding:8px 16px;background:linear-gradient(135deg,#16213e,#0f3460);
            border-bottom:1px solid rgba(0,212,255,.2);flex-shrink:0;z-index:50;
        }
        .topbar-left{display:flex;align-items:center;gap:10px}
        h1{font-size:14px;font-weight:700;color:#00d4ff;white-space:nowrap}
        .topbar a{font-size:11px;color:#888;text-decoration:none;padding:4px 10px;border:1px solid #333;border-radius:12px;transition:all .2s}
        .topbar a:hover{color:#00d4ff;border-color:#00d4ff}
        .status-inline{display:flex;align-items:center;gap:12px}
        .coord-pair{display:flex;gap:8px}
        .ci{background:rgba(0,0,0,.35);padding:3px 10px;border-radius:6px;font-size:12px;font-family:monospace}
        .ci .lbl{color:#666;font-size:9px;margin-right:3px}
        .cx{color:#f97316}.cy{color:#3b82f6}
        .sb{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
        .sb-ok{background:rgba(34,197,94,.2);color:#22c55e}
        .sb-warn{background:rgba(234,179,8,.2);color:#eab308}
        .sb-err{background:rgba(239,68,68,.2);color:#ef4444}

        /* 缩放控件 - 放在顶栏 */
        .zoom-bar{
            display:flex;align-items:center;gap:3px;background:rgba(0,0,0,.35);
            padding:3px 8px;border-radius:8px;
        }
        .zb{
            width:28px;height:24px;border-radius:5px;background:transparent;
            color:#00d4ff;border:1px solid rgba(0,212,255,.25);
            font-size:14px;cursor:pointer;display:flex;align-items:center;
            justify-content:center;transition:all .12s;line-height:1;
        }
        .zb:hover{background:rgba(0,212,255,.18)}
        .zl{font-size:10px;color:#00d4ff;font-family:monospace;text-align:center;min-width:34px;padding:0 2px}
        #mc{flex:1;position:relative;overflow:hidden;cursor:grab;touch-action:none;background:#111}
        #mc.dragging{cursor:grabbing}
        #mw{position:absolute;transform-origin:0 0;will-change:transform}
        #mi{display:block}
        #dot{
            position:absolute;left:0;top:0;width:18px;height:18px;border-radius:50%;
            background:#ff1744;border:2px solid #fff;
            box-shadow:0 0 10px rgba(255,23,68,.9),0 0 30px rgba(255,23,68,.4);
            pointer-events:none;z-index:10;will-change:transform;
            transition:opacity .15s,background .15s;
        }
        #dot.inertial{background:#ffab00;box-shadow:0 0 10px rgba(255,171,0,.9),0 0 30px rgba(255,171,0,.4)}
        #dot.lost{background:#555;border-color:#888;box-shadow:none;opacity:.4}
        @keyframes pulse{
            0%{box-shadow:0 0 10px rgba(255,23,68,.9),0 0 20px rgba(255,23,68,.4)}
            50%{box-shadow:0 0 14px rgba(255,23,68,1),0 0 36px rgba(255,23,68,.6)}
            100%{box-shadow:0 0 10px rgba(255,23,68,.9),0 0 20px rgba(255,23,68,.4)}
        }
        #dot:not(.lost){animation:pulse 1.5s infinite}
        /* ========== 路线绘制层 ========== */
        #routeLayer{
            position:absolute;top:0;left:0;width:100%;height:100%;
            pointer-events:none;z-index:8;overflow:visible;
        }
        #routeLayer .route-line{
            fill:none;stroke:#FFC448;stroke-width:3;
            stroke-linecap:round;stroke-linejoin:round;
            vector-effect:non-scaling-stroke;
        }
        #routeLayer .route-point{
            fill:#FFC448;stroke:#fff;stroke-width:2;
            vector-effect:non-scaling-stroke;
        }
        #routeLayer .route-point.passed{fill:#787878;stroke:#dcdcdc}
        #routeLayer .route-point.active{fill:#78E650;stroke:#fff}
        #routeLayer .route-label{
            font-size:11px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            fill:#fff;paint-order:stroke;stroke:#000;stroke-width:3;
            pointer-events:none;text-anchor:start;
        }

        /* 路线管理面板 */
        .route-panel{
            position:fixed;top:52px;left:10px;z-index:100;
            background:rgba(22,33,62,.95);border:1px solid rgba(0,212,255,.25);
            border-radius:12px;padding:14px;min-width:240px;max-width:280px;
            max-height:calc(100vh - 72px);overflow-y:auto;
            box-shadow:0 8px 32px rgba(0,0,0,.5);
            transition:transform .25s, opacity .25s;transform-origin:top left;
        }
        .route-panel.hidden{transform:translateX(-120%);opacity:0;pointer-events:none}
        .route-panel h3{font-size:13px;color:#00d4ff;margin:0 0 10px;display:flex;align-items:center;gap:8px;white-space:nowrap}
        .route-panel h3 .toggle-btn{margin-left:auto;background:none;border:none;color:#888;cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;border-radius:4px}
        .route-panel h3 .toggle-btn:hover{color:#00d4ff;background:rgba(0,212,255,.15)}
        .rp-list{list-style:none;margin:0;padding:0}
        .rp-item{
            padding:7px 10px;margin-bottom:4px;border-radius:8px;
            cursor:pointer;transition:all .15s;font-size:12px;
            border:1px solid transparent;background:rgba(255,255,255,.04);
            color:#ccc;display:flex;align-items:center;gap:8px;
        }
        .rp-item:hover{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.2);color:#eee}
        .rp-item.selected{background:rgba(0,212,255,.18);border-color:#00d4ff;color:#fff}
        .rp-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .rp-meta{font-size:10px;color:#666;white-space:nowrap}
        .rp-loop{display:inline-block;padding:1px 6px;border-radius:8px;background:#5c6bc0;color:#fff;font-size:9px}
        .panel-toolbar{display:flex;gap:6px;margin-top:8px}
        .panel-toolbar button{
            flex:1;padding:6px 8px;border:none;border-radius:6px;
            cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;
        }
        .pt-open{background:#00d4ff;color:#000}.pt-open:hover{background:#00b8e6}
        .pt-close{background:#333;color:#aaa;border:1px solid #444}.pt-close:hover{background:#444}

        /* 路线切换按钮 (顶栏) */
        .route-toggle-btn{
            background:transparent;border:1px solid rgba(0,212,255,.3);
            color:#00d4ff;padding:3px 12px;border-radius:14px;cursor:pointer;
            font-size:11px;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:4px;white-space:nowrap
        }
        .route-toggle-btn:hover{background:rgba(0,212,255,.15)}
        .route-toggle-btn.active{background:rgba(0,212,255,.2);border-color:#00d4ff}

        /* 地图容器 */
        .float-panel{
            position:fixed;bottom:16px;right:16px;z-index:100;
        }
        .float-toggle{
            background:#16213e;border:1px solid #00d4ff;color:#00d4ff;
            padding:10px 18px;border-radius:24px;cursor:pointer;
            font-size:.9em;font-weight:600;display:flex;align-items:center;gap:6px;
            transition:all .25s;box-shadow:0 4px 16px rgba(0,212,255,.2);
            user-select:none;white-space:nowrap;
        }
        .float-toggle:hover{background:#1a3a5c;transform:scale(1.03)}
        .float-toggle .arrow{transition:transform .3s;font-size:.8em}
        .float-toggle.expanded .arrow{transform:rotate(180deg)}
        .float-body{
            display:none;margin-top:10px;background:#16213e;
            border-radius:12px;padding:16px;
            box-shadow:0 8px 32px rgba(0,0,0,.5);
            max-width:420px;max-height:70vh;overflow-y:auto;
        }
        .float-body.show{display:block;animation:fadeSlideIn .2s ease}
        @keyframes fadeSlideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

        /* 面板内部控件 */
        .float-body .mode-toggle{
            display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;
        }
        .float-body .mode-btn{
            padding:6px 14px;border-radius:20px;font-size:.82em;
            background:#222;color:#aaa;border:1px solid #444;cursor:pointer;transition:all .2s;
        }
        .float-body .mode-btn.active{background:#00d4ff;color:#000;border-color:#00d4ff}

        .float-body .preview-area{position:relative;margin-bottom:8px}
        .float-body canvas,.float-body video,.float-body img{
            border-radius:6px;display:block;background:#2b2b2b;
        }
        #minimapCanvas{width:220px;height:220px;object-fit:contain}
        #scrPrev{width:280px;height:158px;object-fit:contain;border-radius:6px;background:#000;border:1px solid #333}

        .region-overlay{position:absolute;top:0;left:0;pointer-events:none}
        .region-box{
            position:absolute;border:2px dashed #00d4ff;
            background:rgba(0,212,255,.08);border-radius:50%;
            cursor:move;pointer-events:auto;
            box-shadow:0 0 12px rgba(0,212,255,.35);user-select:none;
        }
        .region-handle{
            position:absolute;width:10px;height:10px;background:#00d4ff;
            border:2px solid #fff;border-radius:50%;right:-5px;top:50%;margin-top:-5px;cursor:ew-resize;
        }

        .region-info{font-size:.72em;color:#00d4ff;margin-top:3px;font-family:monospace;white-space:nowrap}

        .float-body .btn-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
        .float-body button{padding:7px 14px;border:none;border-radius:8px;cursor:pointer;font-size:.82em;font-weight:600;transition:all .15s;white-space:nowrap}
        .bp{background:#00d4ff;color:#000}.bp:hover{background:#00b8e6}
        .bs{background:#222;color:#ccc;border:1px solid #444}.bs:hover{background:#333}
        .bd{background:#e53935;color:#fff}.bd:hover{background:#c62828}
        .ba{background:#22c55e;color:#000}
        label.fl{
            display:inline-block;padding:7px 14px;background:#5c6bc0;color:white;
            border-radius:8px;cursor:pointer;font-weight:600;transition:background .2s;font-size:.82em
        }
        label.fl:hover{background:#3f51b5}
        input[type=file]{display:none}

        /* 坐标锁定按钮 */
        .btn-lock{background:#555;color:#ccc;border:1px solid #777;cursor:not-allowed;opacity:.5;font-size:.82em;padding:7px 10px;border-radius:8px}
        .btn-lock.ready{background:#ff9800;color:#000;border-color:#ffb74d;cursor:pointer;opacity:1}
        .btn-lock.ready:hover{background:#f57c00}
        .btn-lock.active{background:#4caf50;color:#fff;border-color:#81c784;cursor:pointer;opacity:1}
        .btn-lock.active:hover{background:#388e3a}
        .btn-reset{background:#607d8b;color:#fff;border:1px solid #90a4ae;cursor:pointer;font-size:.82em;padding:7px 10px;border-radius:8px}
        .btn-reset:hover{background:#455a64}

        /* 测试图片选择器 */
        .test-images{display:none;margin-top:10px;padding-top:8px;border-top:1px solid #333}
        .test-images.show{display:block}
        .test-label{font-size:.75em;color:#888;margin-bottom:6px}
        .test-grid{display:flex;flex-wrap:wrap;gap:4px;max-height:160px;overflow-y:auto}
        .test-item{width:48px;height:48px;border-radius:4px;object-fit:cover;cursor:pointer;border:1.5px solid transparent;transition:border-color .15s}
        .test-item:hover{border-color:#00d4ff}
        .test-item.selected{border-color:#66bb6a}

        #logArea{
            font-family:monospace;font-size:.72em;color:#0f0;background:#0a0a15;
            border-radius:6px;padding:6px 8px;max-height:80px;overflow-y:auto;margin-top:8px;
        }

        #ldMask{
            position:fixed;inset:0;background:#0a0a12;display:flex;flex-direction:column;
            align-items:center;justify-content:center;z-index:9999;transition:opacity .4s
        }
        #ldMask.hide{opacity:0;pointer-events:none}
        .spin{width:48px;height:48px;border:4px solid #222;border-top-color:#00d4ff;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .lt{margin-top:16px;color:#888;font-size:13px}
    </style>
</head>
<body>

<div id="ldMask"><div class="spin"></div><div class="lt">正在加载地图...</div></div>

<div class="topbar">
    <div class="topbar-left">
        <h1>&#127963; 大地图实时追踪</h1>
        <a href="/">&#8617; 返回控制台</a>
    </div>
        <div class="status-inline">
            <div class="coord-pair">
                <div class="ci"><span class="lbl">X</span><span class="cx" id="sx">--</span></div>
                <div class="ci"><span class="lbl">Y</span><span class="cy" id="sy">--</span></div>
            </div>
            <div class="sb sb-warn" id="ss">等待分析</div>
            <!-- 路线按钮 -->
            <button class="route-toggle-btn" id="routeToggleBtn" onclick="toggleRoutePanel()" title="路线管理">&#8679; 路线</button>
            <!-- 缩放控件 -->
        <div class="zoom-bar">
            <button class="zb" onclick="doZ(1.4)" title="放大">+</button>
            <div class="zl" id="zl">100%</div>
            <button class="zb" onclick="doZ(.6)" title="缩小">-</button>
            <button class="zb" onclick="resetV()" title="重置视图">&#8635;</button>
            <button class="zb" onclick="centerP()" title="居中玩家">&#9679;</button>
        </div>
    </div>
</div>

<div id="mc">
    <div id="mw">
        <img id="mi" draggable="false" alt="map">
        <!-- 路线 SVG 叠加层 -->
        <svg id="routeLayer" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <!-- 红点和准星放在 mc 下，与 mw 同级，避免受到地图变换影响 -->
    <svg id="ch" width="44" height="44" viewBox="0 0 44 44" style="position:absolute;left:0;top:0;pointer-events:none;z-index:9;will-change:transform;transition:opacity .15s;opacity:.25;">
        <line x1="22" y1="0" x2="22" y2="16" stroke="#00d4ff" stroke-width="1"/>
        <line x1="22" y1="28" x2="22" y2="44" stroke="#00d4ff" stroke-width="1"/>
        <line x1="0" y1="22" x2="16" y2="22" stroke="#00d4ff" stroke-width="1"/>
        <line x1="28" y1="22" x2="44" y2="22" stroke="#00d4ff" stroke-width="1"/>
        <circle cx="22" cy="22" r="10" stroke="#00d4ff" stroke-width="1" fill="none" opacity=".5"/>
    </svg>
    <div id="dot"></div>
    <!-- 方向箭头指示器 -->
    <svg id="arrowDir" width="40" height="40" viewBox="0 0 40 40"
         style="position:absolute;left:0;top:0;pointer-events:none;z-index:11;
                will-change:transform;transition:opacity .15s;opacity:0;">
        <polygon id="arrowPoly" points="20,2 14,16 26,16" fill="#FFC448" stroke="#fff" stroke-width="1.2"
                 opacity=".85"/>
        <circle id="arrowCircle" cx="20" cy="20" r="7" fill="#FFC448" stroke="#fff" stroke-width="1.2"
                opacity=".85" display="none"/>
    </svg>
</div>

<!-- 悬浮输入面板 (和 index 一致的风格) -->
<div class="float-panel" id="floatPanel">
    <div class="float-toggle" id="floatToggle" onclick="toggleFloatPanel()">
        &#128205; <span class="arrow">&#9660;</span>
    </div>
    <div class="float-body" id="floatBody">
        <!-- 模式切换 -->
        <div class="mode-toggle">
            <button class="mode-btn active" id="mf" data-conn-mode="file" onclick="setIM('file')">文件上传</button>
            <button class="mode-btn" id="ms" data-conn-mode="screen" onclick="startSC()">屏幕捕获</button>
        </div>

        <!-- 预览区 -->
        <div class="preview-area">
            <canvas id="minimapCanvas" width="220" height="220"></canvas>
            <div id="scrArea" style="display:none;">
                <video id="scrPrev" autoplay playsinline muted></video>
                <div class="region-overlay" id="regionOverlay">
                    <div class="region-box" id="regionBox">
                        <div class="region-handle"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="region-info" id="regionInfo" style="display:none;">区域: --</div>

        <!-- 按钮行 -->
        <div class="btn-row">
            <label class="fl" for="fi">选择图片</label><input type="file" id="fi" accept="image/*">
            <button class="bp" onclick="analyzeOnce()">分析</button>
            <button class="bs" id="autoBtn" onclick="toggleAuto()">自动追踪</button>
            <button class="bd" id="stpBtn" style="display:none" onclick="stopSC()">停止</button>
            <button class="btn-lock" id="coordLockBtn" onclick="toggleCoordLock()" disabled title="需要先分析定位积累坐标历史">&#128274; 坐标锁</button>
            <button class="btn-reset" onclick="resetHistory()" title="清空坐标历史">&#128465; 重置</button>
        </div>

        <!-- 测试小地图选择器 -->
        <div class="test-images" id="testImagesArea" style="display:none;">
            <div class="test-label">&#127941; 测试图片（点击选择）：</div>
            <div class="test-grid" id="testGrid"></div>
        </div>

        <div id="logArea"></div>
    </div>
</div>

<!-- 路线管理面板 -->
<div class="route-panel hidden" id="routePanel">
    <h3>&#8679; 路线管理 <button class="toggle-btn" onclick="toggleRoutePanel()">&#10005;</button></h3>
    <ul class="rp-list" id="routeList">
        <li style="color:#666;font-size:12px;padding:8px 0">加载中...</li>
    </ul>
    <div class="panel-toolbar" style="display:none" id="routeToolbar">
        <button class="pt-close" onclick="clearRoute()">清除路线</button>
        <label class="fl" style="padding:5px 10px;font-size:11px" for="routeFileImport">导入JSON</label>
        <input type="file" id="routeFileImport" accept=".json" style="display:none" onchange="importRouteFile(this)">
    </div>
</div>

<video id="osVid" autoplay playsinline muted style="position:fixed;bottom:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1;"></video>

<script src="js/tracker-core.js"></script>
<script>
var $ = function(id){ return document.getElementById(id); };
var MC=$('mc'), MW=$('mw'), MI=$('mi'), DOT=$('dot'), CH=$('ch'), ARWD=$('arrowDir');
var SX=$('sx'), SY=$('sy'), SS=$('ss'), ZL=$('zl');

var mapInfo=null;
var sc=1, ox=0, oy=0;
var dragging=false, dsx=0, dsy=0, dox=0, doy=0;
var lx=null, ly=null, lf=false;
var autoRun=false, autoT=null;
var sending=false;
var lAngle=0; // 最新箭头角度
var lStopped=true; // 是否静止

function setButtonAvailability(buttons, enabled, title) {
    Array.prototype.forEach.call(buttons || [], function(btn) {
        if (!btn) return;
        btn.disabled = !enabled;
        btn.title = title || '';
        if (enabled) {
            btn.style.opacity = '';
            btn.style.cursor = '';
        } else {
            btn.style.opacity = '0.55';
            btn.style.cursor = 'not-allowed';
            btn.classList.remove('active');
        }
    });
}

function applyCompatibilityGuards() {
    var report = TC.getConnectionDiagnostics();
    setButtonAvailability(
        document.querySelectorAll('[data-conn-mode="screen"]'),
        report.screenCapture,
        report.screenCapture ? '开始屏幕捕获' : '当前浏览器不支持屏幕捕获，请改用 Chrome / Edge / Firefox 新版'
    );
}

function logCompatibilityReport() {
    var report = TC.getConnectionDiagnostics();
    var parts = [
        'HTTP上传' + (report.httpUpload ? '✅' : '❌'),
        '屏幕捕获' + (report.screenCapture ? '✅' : '❌'),
        '触屏拖拽' + ('ontouchstart' in window ? '✅' : '⚪')
    ];
    TC.log('兼容检测：' + parts.join(' | '));
}

// === 静止死区：上次被接受的地图坐标，用于过滤 SIFT 微小随机抖动 ===
var _lastDotMapX = null, _lastDotMapY = null, _lastDotAngle = null;
var DOT_POS_DEADZONE = 2;   // 地图坐标单位，低于此距离视为静止不触发 lerp
var DOT_ANGLE_DEADZONE = 2; // 度，低于此角度变化不触发 lerp

const MIN_S=.08, MAX_S=15;

// ========== rAF 插值 ==========
var _lerp = { tx:0, ty:0, cx:0, cy:0, tAngle:0, cAngle:0, running:false };
var LERP_FACTOR = 0.25; // 每帧趋近 25%（位置）
var ANGLE_LERP_FACTOR = 0.5; // 角度每帧趋近 50%（独立系数，更灵敏）

function _angDiff(a, b) { var d=(a-b)%360; return d>180?d-360:d<-180?d+360:d; }

function _lerpTick() {
    var dx = _lerp.tx - _lerp.cx;
    var dy = _lerp.ty - _lerp.cy;
    var da = _angDiff(_lerp.tAngle, _lerp.cAngle);
    if (Math.abs(dx) < 0.3 && Math.abs(dy) < 0.3 && Math.abs(da) < 0.5) {
        _lerp.cx = _lerp.tx; _lerp.cy = _lerp.ty; _lerp.cAngle = _lerp.tAngle;
        _applyDotPos(_lerp.cx, _lerp.cy, _lerp.cAngle);
        _lerp.running = false;
        return;
    }
    _lerp.cx += dx * LERP_FACTOR;
    _lerp.cy += dy * LERP_FACTOR;
    _lerp.cAngle += da * ANGLE_LERP_FACTOR;
    _applyDotPos(_lerp.cx, _lerp.cy, _lerp.cAngle);
    requestAnimationFrame(_lerpTick);
}

function _applyDotPos(sx, sy, angle) {
    var pos = 'translate(' + sx + 'px,' + sy + 'px)';
    DOT.style.transform = pos + ' translate(-50%,-50%)';
    CH.style.transform = pos + ' translate(-50%,-50%)';

}

async function init() {
    try { mapInfo = await (await fetch('/api/map_info')).json(); }
    catch(e){ alert('\u83b7\u53d6\u5730\u56fe\u4fe1\u606f\u5931\u8d25: '+e.message); return; }
    MI.src = mapInfo.display_map_url + '?t='+Date.now();
    await new Promise(function(ok,no){ MI.onload=ok; MI.onerror=function(){no(new Error('\u5730\u56fe\u52a0\u8f7d\u5931\u8d25'));}; });
    fitMap();
    // 初始化路线 SVG 层的视口
    var rl=$('routeLayer');
    if(rl&&mapInfo)rl.setAttribute('viewBox','0 0 '+mapInfo.map_width+' '+mapInfo.map_height);
    setTimeout(function(){ $('ldMask').classList.add('hide'); },300);

function fitMap() {
    if(!MC||!mapInfo) return;
    var cw=MC.clientWidth, ch=MC.clientHeight;
    sc=Math.min(cw/mapInfo.map_width,ch/mapInfo.map_height);
    ox=(cw-mapInfo.map_width*sc)/2;
    oy=(ch-mapInfo.map_height*sc)/2;
    applyT();
}
function applyT() {
    MW.style.transform='translate('+ox+'px,'+oy+'px) scale('+sc+')';
    ZL.textContent=Math.round(sc*100)+'%';
    // 缩放/平移后立即同步点位屏幕坐标，防止点位漂移到错误位置
    if (lx !== null) {
        var _sx = lx * sc + ox, _sy = ly * sc + oy;
        _lerp.tx = _sx; _lerp.ty = _sy;
        _lerp.cx = _sx; _lerp.cy = _sy;
        _applyDotPos(_sx, _sy, _lerp.cAngle);
    }
}

// ========== 红点 & UI 更新 ==========
function setDot(x, y, state, found, angle, stopped){
    // 地图坐标 → 屏幕坐标
    var screenX = x * sc + ox;
    var screenY = y * sc + oy;
    angle = angle || 0;
    stopped = !!stopped;

    // 箭头/圆形切换
    var ap = document.getElementById('arrowPoly');
    var ac = document.getElementById('arrowCircle');
    if (ap && ac) {
        ap.setAttribute('display', stopped ? 'none' : '');
        ac.setAttribute('display', stopped ? '' : 'none');
    }

    // === 静止死区过滤：位置和角度变化量均低于阈值时跳过 lerp，消除静止抖动 ===
    if (_lastDotMapX !== null) {
        var _dp = Math.sqrt((x-_lastDotMapX)*(x-_lastDotMapX)+(y-_lastDotMapY)*(y-_lastDotMapY));
        var _da = Math.abs(_angDiff(angle, _lastDotAngle));
        if (_dp < DOT_POS_DEADZONE && _da < DOT_ANGLE_DEADZONE) {
            // 仅更新状态样式与坐标显示，不触发新的 lerp 动画
            DOT.classList.remove('inertial','lost');
            if(!found){ DOT.classList.add('lost'); ARWD.style.opacity='0'; }
            else {
                if(state==='INERTIAL') DOT.classList.add('inertial');
                ARWD.style.opacity='.85';
            }
            CH.style.opacity=found?'.25':'0';
            SX.textContent=Math.round(x); SY.textContent=Math.round(y);
            return;
        }
    }
    _lastDotMapX = x; _lastDotMapY = y; _lastDotAngle = angle;

    // 更新 lerp 目标
    if (_lerp.cx === 0 && _lerp.cy === 0) {
        // 首次定位：直接跳转
        _lerp.cx = screenX; _lerp.cy = screenY; _lerp.cAngle = angle;
    }
    _lerp.tx = screenX; _lerp.ty = screenY; _lerp.tAngle = angle;
    if (!_lerp.running) {
        _lerp.running = true;
        requestAnimationFrame(_lerpTick);
    }

    DOT.classList.remove('inertial','lost');
    if(!found){ DOT.classList.add('lost'); ARWD.style.opacity='0'; }
    else {
        if(state==='INERTIAL') DOT.classList.add('inertial');
        ARWD.style.opacity='.85';
    }
    CH.style.opacity=found?'.25':'0';
    SX.textContent=Math.round(x);SY.textContent=Math.round(y);
}

function updUIBig(d){
    var f = TC.formatStatus(d.status || d);

// ========== 缩放/拖拽 ==========
function doZ(f,px,py){
    if(px==null){px=MC.clientWidth/2;py=MC.clientHeight/2;}
    var ns=TC.clamp(sc*f,MIN_S,MAX_S);
    ox=px-(px-ox)*(ns/sc);
    oy=py-(py-oy)*(ns/sc);
    sc=ns;applyT();
}
function resetV(){fitMap()}
function centerP(){
    if(lx==null)return;
    var cw=MC.clientWidth,ch=MC.clientHeight;
    ox=cw/2-lx*sc;oy=ch/2-ly*sc;applyT();
}
function ensureVis(px,py){
    var cw=MC.clientWidth,ch=MC.clientHeight;
    var sx=px*sc+ox,sy=py*sc+oy,pad=80;
    var chg=false;
    if(sx<pad){ox+=pad-sx;chg=true}
    if(sx>cw-pad){ox+=cw-pad-sx;chg=true}
    if(sy<pad){oy+=pad-sy;chg=true}
    if(sy>ch-pad){oy+=ch-pad-sy;chg=true}
    if(chg)applyT();
}

function bindEv(){
    MC.addEventListener('mousedown',function(e){
        if(e.target.tagName==='BUTTON')return;
        dragging=true;MC.classList.add('dragging');
        dsx=e.clientX;dsy=e.clientY;dox=ox;doy=oy;
        document.addEventListener('mousemove',onDragMove);
        document.addEventListener('mouseup',onDragUp);
        e.preventDefault();
    });
    function onDragMove(e){if(!dragging)return;ox=dox+(e.clientX-dsx);oy=doy+(e.clientY-dsy);applyT();}
    function onDragUp(){dragging=false;MC.classList.remove('dragging');document.removeEventListener('mousemove',onDragMove);document.removeEventListener('mouseup',onDragUp)}

    MC.addEventListener('touchstart',function(e){
        if(e.target.tagName==='BUTTON')return;
        var t=e.touches[0];dragging=true;dsx=t.clientX;dsy=t.clientY;dox=ox;doy=oy;
    },{passive:true});
    MC.addEventListener('touchmove',function(e){
        if(!dragging||!e.touches[0])return;
        var t=e.touches[0];ox=dox+(t.clientX-dsx);oy=doy+(t.clientY-dsy);applyT();
    },{passive:true});
    MC.addEventListener('touchend',function(){dragging=false});

    MC.addEventListener('wheel',function(e){
        e.preventDefault();
        var rect=MC.getBoundingClientRect();
        doZ(e.deltaY<0?1.12:.88, e.clientX-rect.left, e.clientY-rect.top);
    },{passive:false});

    window.addEventListener('resize',function(){requestAnimationFrame(fitMap);});

    // 文件输入 - 绑定到 TC
    TC.bindFileInput($('fi'), $('minimapCanvas'));

    // 屏幕捕获圆形选区拖拽
    setupRegionDrag();

    MC.addEventListener('dblclick',centerP);
}

// ========== 屏幕捕获圆形选区 (和 index 一致) ==========
var dragState = { active:false, type:'', startX:0, startY:0, startCircle:null };
function setupRegionDrag() {
    var box = $('regionBox');
    var overlay = $('regionOverlay');
    var handle = box ? box.querySelector('.region-handle') : null;
    var preview = $('scrPrev');
    if (!box || !overlay || !preview) return;

    function updateCircleSize() {
        var rect = preview.getBoundingClientRect();
        overlay.style.width = rect.width + 'px'; overlay.style.height = rect.height + 'px';
        var size = Math.min(rect.width, rect.height);
        box.style.left = (TC.selCircle.cx * rect.width - TC.selCircle.r * size) + 'px';
        box.style.top = (TC.selCircle.cy * rect.height - TC.selCircle.r * size) + 'px';
        var d = TC.selCircle.r * size * 2;
        box.style.width = d + 'px'; box.style.height = d + 'px';
        if (preview.videoWidth) {
            var realCX = Math.round(TC.selCircle.cx * preview.videoWidth);
            var realCY = Math.round(TC.selCircle.cy * preview.videoHeight);
            var realR = Math.round(TC.selCircle.r * Math.min(preview.videoWidth, preview.videoHeight));
            $('regionInfo').textContent =
                '\u9009\u533a: ('+realCX+','+realCY+') r'+realR+' ['+preview.videoWidth+'x'+preview.videoHeight+']';
        }
    }

    function getPos(e) { var r = overlay.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
    function onDown(type, e) {
        e.preventDefault(); e.stopPropagation();
        dragState = { active:true, type:type, startX:getPos(e).x, startY:getPos(e).y, startCircle:{cx:TC.selCircle.cx,cy:TC.selCircle.cy,r:TC.selCircle.r} };
        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp);
    }
    function onMove(e) {
        if(!dragState.active) return;
        var p=getPos(e), rect=overlay.getBoundingClientRect(), base=Math.min(rect.width,rect.height);
        var dx=(p.x-dragState.startX)/base, dy=(p.y-dragState.startY)/base, sc=dragState.startCircle;
        if(dragState.type==='move'){TC.selCircle.cx=TC.clamp(sc.cx+dx,0,1);TC.selCircle.cy=TC.clamp(sc.cy+dy,0,1);}
        else{var maxR=Math.max(sc.cx,1-sc.cx,sc.cy,1-sc.cy);TC.selCircle.r=TC.clamp(sc.r+dx,0.03,Math.min(0.49,maxR));}
        updateCircleSize();
    }
    function onUp(){dragState.active=false;document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp)}

    box.addEventListener('mousedown',function(e){onDown('move',e);});
    if(handle) handle.addEventListener('mousedown',function(e){onDown('resize',e);});
    box.addEventListener('touchstart',function(e){onDown('move',e.touches[0]);},{passive:false});
    if(handle) handle.addEventListener('touchstart',function(e){onDown('resize',e.touches[0]);},{passive:false});
    document.addEventListener('touchmove',function(e){if(dragState.active&&e.touches[0])onMove(e.touches[0]);},{passive:false});
    document.addEventListener('touchend',onUp);

    // 双击开始自动追踪
    box.addEventListener('dblclick',function(){if(typeof toggleAuto==='function')toggleAuto();});

    // 初始尺寸 + resize 监听
    preview.addEventListener('loadedmetadata',updateCircleSize);
    window.__bmUpdateRegionBox = updateCircleSize;
}

// ========== 路线模块 ==========
var RouteModule = (function(){
    var currentRoute = null;   // 当前加载的路线数据
    var activeIndex = -1;      // 当前激活的 waypoint 索引 (-1=未开始)
    var routeVisible = true;   // 路线是否显示

    // 颜色常量（兼容 sift-map-tracker）
    var COLORS = {
        line: '#FFC448',       // 青蓝色线条
        point: '#FFC448',      // 默认点
        passed: '#787878',     // 已经过 - 灰色
        active: '#78E650',     // 当前目标 - 绿色
        labelFill: '#fff',
        labelStroke: '#000'
    };

    /**
     * 加载并渲染路线数据 (兼容 sift-map-tracker JSON 格式)
     * @param {Object} data - {name, loop, points:[{x,y,label,radius}], notes}
     */
    function loadRoute(data) {
        if (!data || !data.points || !data.points.length) return;
        currentRoute = data;
        activeIndex = -1;
        render();
        updateBtnState();
        // 视角移动到路线中心
        var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        data.points.forEach(function(p) {
            minX = Math.min(minX, p.x);
            maxX = Math.max(maxX, p.x);
            minY = Math.min(minY, p.y);
            maxY = Math.max(maxY, p.y);
        });
        var centerX = (minX + maxX) / 2;
        var centerY = (minY + maxY) / 2;
        var cw = MC.clientWidth, ch = MC.clientHeight;
        ox = cw/2 - centerX * sc;
        oy = ch/2 - centerY * sc;
        applyT();
        TC.log('已加载路线: ' + (data.name || '未命名') + ' (' + data.points.length + ' 点' + (data.loop ? ', 循环' : '') + ')');
    }

    /** 清除当前路线 */
    function clear() {
        currentRoute = null;
        activeIndex = -1;
        render();
        updateBtnState();
        // 取消选中状态
        var items = document.querySelectorAll('#routeList .rp-item');
        Array.prototype.forEach.call(items, function(el){ el.classList.remove('selected'); });
    }

    /** 切换可见性 */
    function toggleVisibility() {
        routeVisible = !routeVisible;
        var layer = $('routeLayer');
        if (layer) layer.style.display = routeVisible ? '' : 'none';
        return routeVisible;
    }

    /** 设置当前 waypoint 索引 (供外部调用，根据玩家位置推进) */
    function setActiveIndex(idx) {
        if (!currentRoute || idx === activeIndex) return;
        activeIndex = idx;
        render();
    }

    /** 计算两点间距离 */
    function _dist(ax, ay, bx, by) { var dx=ax-bx, dy=ay-by; return Math.sqrt(dx*dx+dy*dy); }

    /**
     * 根据玩家坐标自动计算最近的 waypoint 并推进索引
     *
     * 算法 (兼容 sift-map-tracker RouteNavigator.update):
     * 1. 初始状态(activeIndex<0): 找到最近的点作为起点
     * 2. 正常导航: 检查玩家是否进入当前目标点的 radius 范围内
     * 3. 进入范围则推进 activeIndex
     * 4. 循环路线到达末尾时回到起点
     */
    function updateFromPlayer(px, py) {
        if (!currentRoute || !currentRoute.points.length) return;
        if (px == null || py == null) return;

        var pts = currentRoute.points;
        var len = pts.length;

        // --- 阶段1: 初始定位 ---
        // 还没开始导航时，找到离玩家最近的点作为起点
        if (activeIndex < 0) {
            var minDist = Infinity, bestIdx = 0;
            for (var i = 0; i < len; i++) {
                var d = _dist(px, py, pts[i].x, pts[i].y);
                if (d < minDist) { minDist = d; bestIdx = i; }
            }
            activeIndex = bestIdx;
            render();
            return;
        }

        // --- 阶段2: 正常导航推进 ---

        // 计算玩家到当前目标点的距离
        var curPt = pts[activeIndex];
        var distToActive = _dist(px, py, curPt.x, curPt.y);
        var reachRadius = curPt.radius || 28;

        // 检查是否进入当前目标点的判定范围
        if (distToActive <= reachRadius) {
            if (activeIndex < len - 1) {
                // 推进到下一个点
                activeIndex++;
                render();
                return;
            } else if (currentRoute.loop && activeIndex >= len - 1) {
                // 循环路线：回到起点
                activeIndex = 0;
                render();
                return;
            }
        }

        // 阶段3: 容错 — 如果玩家跳过了某个点（比如传送），
        // 检查后面是否有更近的点，允许跳跃前进
        for (var lookAhead = activeIndex + 1; lookAhead < len; lookAhead++) {
            var dAhead = _dist(px, py, pts[lookAhead].x, pts[lookAhead].y);
            if (dAhead <= (pts[lookAhead].radius || 28)) {
                activeIndex = lookAhead;
                render();
                return;
            }
        }

        // 阶段4: 回退检测 — 如果玩家往回走了很多，
        // 且离前面的点更近，则回退 activeIndex（仅非循环路线）
        if (!currentRoute.loop && activeIndex > 0) {
            for (var lookBack = activeIndex - 1; lookBack >= 0; lookBack--) {
                var dBack = _dist(px, py, pts[lookBack].x, pts[lookBack].y);
                if (dBack <= (pts[lookBack].radius || 28)) {
                    activeIndex = lookBack;
                    render();
                    return;
                }
                // 如果距离越来越远就停止回退搜索
                if (lookBack < activeIndex - 3) break; // 最多回退3个点
            }
        }
    }

    /** 核心渲染函数: 在 SVG 层上绘制路线 */
    function render() {
        var svg = $('routeLayer');
        if (!svg) return;
        svg.innerHTML = '';

        if (!currentRoute || !currentRoute.points.length) return;
        if (!routeVisible) return;

        var pts = currentRoute.points;
        if (pts.length === 0) return;

        // 设置 SVG 视口为地图尺寸 (routeLayer 是 #mw 的子元素，自动继承变换)
        if (mapInfo) {
            svg.setAttribute('viewBox', '0 0 ' + mapInfo.map_width + ' ' + mapInfo.map_height);
        }

        // 1. 绘制连线 (polyline 或 polygon)
        if (pts.length >= 2) {
            var pointsStr = pts.map(function(p){ return p.x + ',' + p.y; }).join(' ');
            var polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
            polyline.setAttribute('points', pointsStr);
            polyline.setAttribute('class', 'route-line');
            svg.appendChild(polyline);
        }

        // 2. 绘制每个路径点
        for (var i = 0; i < pts.length; i++) {
            var p = pts[i];
            var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

            // 确定点样式
            var isPassed = (activeIndex >= 0 && i < activeIndex);
            var isActive = (activeIndex >= 0 && i === activeIndex);
            var isCompleted = (activeIndex >= 0 && !currentRoute.loop && activeIndex >= pts.length);

            var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', p.x);
            circle.setAttribute('cy', p.y);
            circle.setAttribute('r', '7');
            circle.setAttribute('class', 'route-point' + (isPassed ? ' passed' : '') + (isActive ? ' active' : ''));
            g.appendChild(circle);

            // 白色描边圆 (半径10)
            var outline = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            outline.setAttribute('cx', p.x);
            outline.setAttribute('cy', p.y);
            outline.setAttribute('r', '10');
            outline.setAttribute('fill', 'none');
            outline.setAttribute('stroke', isActive ? '#fff' : (isPassed ? '#dcdcdc' : 'rgba(255,255,255,.6)'));
            outline.setAttribute('stroke-width', '2');
            g.appendChild(outline);

            // 半径指示圈 (淡色)
            var rad = p.radius || 28;
            if (rad > 0) {
                var radCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                radCircle.setAttribute('cx', p.x);
                radCircle.setAttribute('cy', p.y);
                radCircle.setAttribute('r', String(rad));
                radCircle.setAttribute('fill', 'none');
                radCircle.setAttribute('stroke', isActive ? 'rgba(120,230,80,.25)' : 'rgba(255,196,72,.15)');
                radCircle.setAttribute('stroke-width', '1');
                radCircle.setAttribute('stroke-dasharray', '4,4');
                g.appendChild(radCircle);
            }

            // 标签文本
            var lbl = p.label || ('节点 ' + (i + 1));
            var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', p.x + 14);
            text.setAttribute('y', p.y + 4);
            text.setAttribute('class', 'route-label');
            text.textContent = lbl;
            g.appendChild(text);

            svg.appendChild(g);
        }
    }

    /** 更新顶栏按钮状态 */
    function updateBtnState() {
        var btn = $('routeToggleBtn');
        if (!btn) return;
        if (currentRoute) {
            btn.classList.add('active');
            btn.innerHTML = '&#10003; ' + (currentRoute.name || '已加载').substring(0, 8);
            btn.title = (currentRoute.name || '') + ' (' + currentRoute.points.length + ' 点)';
        } else {
            btn.classList.remove('active');
            btn.innerHTML = '&#8679; 路线';
            btn.title = '路线管理';
        }
        // 显示/隐藏工具栏
        var tb = $('routeToolbar');
        if (tb) tb.style.display = currentRoute ? 'flex' : 'none';
    }

    /** 获取当前路线信息 */
    function getInfo() {
        if (!currentRoute) return null;
        return {
            name: currentRoute.name,
            loop: currentRoute.loop,
            totalPoints: currentRoute.points.length,
            activeIndex: activeIndex,
            completed: activeIndex >= 0 && !currentRoute.loop && activeIndex >= currentRoute.points.length,
        };
    }

    return {
        load: loadRoute,
        clear: clear,
        toggleVisibility: toggleVisibility,
        setActiveIndex: setActiveIndex,
        updateFromPlayer: updateFromPlayer,
        render: render,
        getInfo: getInfo,
        get currentRoute(){return currentRoute;},
        get activeIndex(){return activeIndex;}
    };
})();

/** 加载远程路线列表 */
async function loadRouteList(){
    try {
        var resp = await fetch('/api/routes');
        var routes = await resp.json();
        var listEl = $('routeList');
        if (!listEl) return;
        listEl.innerHTML = '';
        if (routes.length === 0) {
            listEl.innerHTML = '<li style="color:#666;font-size:12px;padding:8px 0">暂无路线文件</li>';
            return;
        }
        routes.forEach(function(r){
            var li = document.createElement('li');
            li.className = 'rp-item';
            li.dataset.filename = r.filename;
            li.innerHTML =
                '<span class="rp-name">' + escapeHtml(r.name) + '</span>' +
                (r.loop ? '<span class="rp-loop">循环</span>' : '') +
                '<span class="rp-meta">' + r.point_count + '点</span>';
            li.onclick = function(){ selectRoute(this); };
            listEl.appendChild(li);
        });
    } catch(e){
        console.error('加载路线列表失败:', e);
    }
}

/** 选中并加载单个路线 */
async function selectRoute(liEl){
    var filename = liEl.dataset.filename;
    if(!filename) return;

    // UI 选中效果
    Array.prototype.forEach.call(document.querySelectorAll('#routeList .rp-item'), function(e){e.classList.remove('selected');});
    liEl.classList.add('selected');

    try{
        var resp = await fetch('/api/routes/' + encodeURIComponent(filename));
        var data = await resp.json();
        RouteModule.load(data);
        // 自动关闭面板
        // $('routePanel').classList.add('hidden');
    }catch(e){
        TC.log('加载路线失败: '+e.message);
    }
}

/** 清除当前路线 */
function clearRoute(){
    RouteModule.clear();
    TC.log('已清除路线');
}

/** 导入本地 JSON 路线文件 */
function importRouteFile(input){
    var file = input.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
        try{
            var data = JSON.parse(e.target.result);
            data.name = data.name || file.name.replace('.json','');
            RouteModule.load(data);
            TC.log('已导入: '+(data.name||file.name));
        }catch(err){
            TC.log('JSON 解析失败: '+err.message);
        }
    };
    reader.readAsText(file);
    input.value = ''; // reset 以便重复导入同一文件
}

/** 切换路线面板 */
function toggleRoutePanel(){
    var panel=$('routePanel'),btn=$('routeToggleBtn');
    panel.classList.toggle('hidden');
    if(!panel.classList.contains('hidden')){
        loadRouteList(); // 打开时刷新列表
    }
    if(btn)btn.classList.toggle('active',!panel.classList.contains('hidden'));
}

// ========== 坐标锁定模式 (与 index 一致) ==========
var coordLockEnabled = false;
var lockBtn = $('coordLockBtn');

async function toggleCoordLock() {
    if (!lockBtn || lockBtn.disabled && !lockBtn.classList.contains('active')) return;
    try {
        var resp = await fetch('/api/coord_lock', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'toggle' })
        });
        var data = await resp.json();
        if (data.success !== undefined) {
            coordLockEnabled = data.enabled;
            updateLockButton();
            TC.log(coordLockEnabled ? '\U0001f512 坐标锁定已开启' : '\U0001f513 坐标锁定已关闭');
        } else { TC.log('\u26a0\ufe0f 锁定操作失败: ' + (data.error || '')); }
    } catch(e) { TC.log('\u274c 锁定请求失败: ' + e.message); }
}

function updateLockButton() {
    if (!lockBtn) return;
    if (coordLockEnabled) {
        lockBtn.classList.remove('ready'); lockBtn.classList.add('active');
        lockBtn.textContent=' 已锁定'; lockBtn.title='点击关闭坐标锁定';
    } else {
        lockBtn.classList.remove('active');
        lockBtn.title='需要先分析定位积累坐标历史';
    }
}

function checkLockReadiness() {
    if (!lockBtn) return;
    fetch('/api/coord_lock', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'query' })
    }).then(function(r){ return r.json(); }).then(function(data){
        if (!coordLockEnabled) {
            if (data.can_activate) {
                lockBtn.disabled = false; lockBtn.classList.add('ready');
                lockBtn.title='历史'+data.history_count+'个，可开启坐标锁';
                if (!lockBtn.classList.contains('active')) lockBtn.textContent=' 坐标锁';
            } else {
                lockBtn.disabled = true; lockBtn.classList.remove('ready');
                lockBtn.textContent='\U0001f512 锁('+data.history_count+')';
                lockBtn.title='还需积累更多坐标 ('+data.history_count+'/10)';
            }
        }
    }).catch(function(){});
}

async function resetHistory() {
    if (!confirm('确定清空所有坐标历史？\n坐标锁定将被关闭。')) return;
    try {
        var resp = await fetch('/api/reset_history', { method: 'POST' });
        var data = await resp.json();
        if (data.success) {
            TC.log('\U0001f5d1 已清除 '+data.cleared_count+' 条记录');
            coordLockEnabled = false; updateLockButton(); checkLockReadiness();
        } else TC.log('\u26a0\ufe0f 失败: '+(data.error||''));
    } catch(e) { TC.log('\u274c 请求失败: '+e.message); }
}
