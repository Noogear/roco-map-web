<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能雷达跟点</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            font-size: 1.5em;
            margin-bottom: 16px;
            color: #00d4ff;
        }
        .container {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            width: 100%;
            max-width: min(80vmin, 760px);
        }
        .panel-title {
            font-size: 1em;
            color: #888;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .preview-area {
            position: relative;
        }
        canvas, img {
            border-radius: 8px;
            display: block;
            background: #2b2b2b;
        }
        #minimapCanvas {
            cursor: crosshair;
            width: 300px;
            height: 300px;
            object-fit: contain;
        }
        #resultImg {
            width: 100%;
            height: auto;
            max-width: min(80vmin, 700px);
            aspect-ratio: 1 / 1;
            object-fit: contain;
        }
        .status-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }
        .status-item {
            background: #0f3460;
            padding: 10px 14px;
            border-radius: 8px;
            text-align: center;
        }
        .status-label { font-size: 0.75em; color: #999; }
        .status-value { font-size: 1.1em; font-weight: bold; margin-top: 4px; }
        .state-global { color: #ffa726; }
        .state-local { color: #66bb6a; }
        .state-lost { color: #ef5350; }
        .found-yes { color: #66bb6a; }
        .found-no { color: #ef5350; }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-primary:hover { background: #00b8e6; transform: translateY(-1px); }
        .btn-secondary { background: #333; color: #fff; border: 1px solid #555; }
        .btn-secondary:hover { background: #444; }
        .btn-danger { background: #e53935; color: #fff; }
        .btn-danger:hover { background: #c62828; }
        .btn-pip { background: #7c4dff; color: #fff; border: 1px solid #b388ff; }
        .btn-pip:hover { background: #651fff; transform: translateY(-1px); }
        .btn-pip.active { background: #00e676; color: #000; border-color: #00e676; }

        input[type="file"] { display: none; }
        label.file-label {
            display: inline-block;
            padding: 10px 20px;
            background: #5c6bc0;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        label.file-label:hover { background: #3f51b5; }

        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .mode-btn {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            background: #222;
            color: #aaa;
            border: 1px solid #444;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background: #00d4ff;
            color: #000;
            border-color: #00d4ff;
        }

        /* 测试图片选择器 */
        .test-images {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #333;
        }
        .test-images.show { display: block; }
        .test-label {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 8px;
        }
        .test-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
        .test-item {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .test-item:hover { border-color: #00d4ff; }
        .test-item.selected { border-color: #66bb6a; }

        /* 悬浮输入面板 */
        .float-panel {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
        }
        .float-toggle {
            background: #16213e;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 18px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s;
            box-shadow: 0 4px 16px rgba(0,212,255,0.2);
            user-select: none;
            white-space: nowrap;
        }
        .float-toggle:hover { background: #1a3a5c; transform: scale(1.03); }
        .float-toggle .arrow { transition: transform 0.3s; font-size: 0.8em; }
        .float-toggle.expanded .arrow { transform: rotate(180deg); }
        .float-body {
            display: none;
            margin-top: 10px;
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 520px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .float-body.show { display: block; animation: fadeSlideIn 0.2s ease; }
        @keyframes fadeSlideIn { from{opacity:0;transform:translateY(-8px);} to{opacity:1;transform:translateY(0);} }

        /* 屏幕捕获 & 圆形选区 */
        #screenVideoContainer {
            position: relative;
            display: inline-block;
        }
        #screenPreview {
            width: 480px;
            height: 270px;
            object-fit: contain;
            border-radius: 8px;
            background: #111;
        }
        .region-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .region-box {
            position: absolute;
            border: 2px dashed #00d4ff;
            background: rgba(0, 212, 255, 0.08);
            border-radius: 50%;
            cursor: move;
            pointer-events: auto;
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.35);
            user-select: none;
        }
        .region-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #00d4ff;
            border: 2px solid #fff;
            border-radius: 50%;
            right: -6px;
            top: 50%;
            margin-top: -6px;
            cursor: ew-resize;
        }

        .region-info {
            font-size: 0.75em;
            color: #00d4ff;
            margin-top: 4px;
            font-family: monospace;
            white-space: nowrap;
        }

        #logArea {
            margin-top: 16px;
            background: #0a0a15;
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.8em;
            color: #0f0;
            max-height: 150px;
            overflow-y: auto;
            width: 100%;
        }

        @media (max-width: 900px) {
            #resultImg { width: 350px; height: 350px; }
        }
    </style>
</head>
<body>

    <!-- 识别模式切换 -->
    <div class="mode-toggle" id="algoModeToggle" style="display:none;">
        <span style="color:#888; font-size:0.85em; margin-right:8px;">识别引擎:</span>
        <button class="mode-btn active" id="algoSift" onclick="switchAlgo('sift')">⚡ SIFT (快速)</button>
        <button class="mode-btn" id="algoLoftr" onclick="switchAlgo('loftr')">🧠 LoFTR (AI)</button>
    </div>

    <div class="mode-toggle" style="display:none;">
        <button class="mode-btn active" id="modeFile" onclick="setMode('file')">📁 文件上传</button>
        <button class="mode-btn" id="modeScreen" onclick="startScreenCapture()">🖥️ 屏幕捕获</button>
    </div>

    <div class="container">
        <!-- 右侧：结果输出（独占） -->
        <div class="panel" style="max-width:700px;">
            <div class="panel-title" style="display:none;">🗺️ 地图追踪结果</div>
            <div class="preview-area">
                <img id="resultImg" src="" alt="等待分析...">
            </div>
            <div class="status-bar">
                <div class="status-item" style="display:none;">
                    <div class="status-label">引擎</div>
                    <div class="status-value" id="statusMode" style="color:#00d4ff;">SIFT</div>
                </div>
                <div class="status-item" style="display:none;">
                    <div class="status-label">状态</div>
                    <div class="status-value state-global" id="statusState">--</div>
                </div>
                <div class="status-item">
                    <div class="status-label">坐标 X</div>
                    <div class="status-value" id="statusX">--</div>
                </div>
                <div class="status-item">
                    <div class="status-label">坐标 Y</div>
                    <div class="status-value" id="statusY">--</div>
                </div>
                <div class="status-item" style="display:none;">
                    <div class="status-label">是否找到</div>
                    <div class="status-value found-no" id="statusFound">--</div>
                </div>
                <div class="status-item" style="display:none;">
                    <div class="status-label">匹配点数</div>
                    <div class="status-value" id="statusMatches">--</div>
                </div>
            </div>
            <div id="logArea"></div>
        </div>
    </div>

    <!-- 悬浮输入面板 -->
    <div class="float-panel" id="floatPanel">
        <div class="float-toggle" id="floatToggle" onclick="toggleFloatPanel()">
            📍 <span class="arrow">▼</span>
        </div>
        <div class="float-body" id="floatBody">
            <!-- 模式切换 -->
            <div class="mode-toggle" style="margin-bottom:12px;">
                <button class="mode-btn active" id="modeFile" onclick="setMode('file')">📁 文件上传</button>
                <button class="mode-btn" id="modeScreen" onclick="startScreenCapture()">🖥️ 屏幕捕获</button>
            </div>

            <!-- 预览区 -->
            <div class="preview-area">
                <canvas id="minimapCanvas" width="300" height="300"></canvas>
                <div id="screenVideoContainer" style="display:none;">
                    <video id="screenPreview" autoplay playsinline muted></video>
                    <div class="region-overlay" id="regionOverlay">
                        <div class="region-box" id="regionBox">
                            <div class="region-handle"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="region-info" id="regionInfo" style="display:none;">区域: --</div>

            <!-- 按钮行 -->
            <div class="btn-row">
                <label for="fileInput" class="file-label">📂 上传图片</label>
                <input type="file" id="fileInput" accept="image/*">
                <button class="btn-primary" onclick="processImage()">▶️ 分析定位</button>
                <button class="btn-pip" id="pipBtn" onclick="togglePiP()" title="画中画悬浮窗">🖼️ 悬浮窗</button>
                <button class="btn-danger" onclick="stopScreenCapture()" id="stopScreenBtn" style="display:none;">⏹ 停止捕获</button>
            </div>

            <!-- 测试小地图选择器 -->
            <div class="test-images" id="testImagesArea" style="display:none;">
                <div class="test-label">🧪 测试图片（点击选择）：</div>
                <div class="test-grid" id="testGrid"></div>
            </div>
        </div>
    </div>

    <!-- 离屏视频：始终渲染帧供截图用，不受面板收起影响 -->
    <video id="screenOffscreen" autoplay playsinline muted style="position:fixed;bottom:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1;"></video>

    <!-- 画中画 Video PiP fallback 用（隐藏） -->
    <video id="pipVideo" muted style="display:none;" autoplay playsinline></video>
    <canvas id="pipCanvas" style="display:none;" width="400" height="400"></canvas>

<script>
let currentMode = 'file';
let currentAlgo = 'sift';
let currentImageData = null;

// ========== 日志工具 ==========
function log(msg) {
    const el = document.getElementById('logArea');
    if (!el) return;
    const time = new Date().toLocaleTimeString();
    el.textContent += `[${time}] ${msg}\n`;
    if (el.textContent.length > 5000) el.textContent = el.textContent.slice(el.textContent.length - 4000);
    el.scrollTop = el.scrollHeight;
}

// ========== 屏幕捕获状态 ==========
let screenStream = null;
let screenVideoEl = null;
let offscreenVideoEl = null;
let screenAutoId = null;
let screenRunning = false;
let cachedVideoW = 0;
let cachedVideoH = 0;
let selCircle = { cx: (1189+62.5)/1362, cy: (66+63.5)/806, r: Math.max(62.5/1362, 63.5/806) };
let dragState = { active: false, type: '', startX: 0, startY: 0, startCircle: null };

// ========== 悬浮面板 ==========
function toggleFloatPanel() {
    document.getElementById('floatBody').classList.toggle('show');
    document.getElementById('floatToggle').classList.toggle('expanded');
}

// ========== 屏幕捕获 ==========

async function startScreenCapture() {
    try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({
            video: { cursor: 'always', displaySurface: 'monitor' },
            audio: false,
        });
    } catch(e) { log('屏幕捕获失败/已取消: ' + e.message); return; }

    currentMode = 'screen';
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('modeScreen').classList.add('active');

    const canvas = document.getElementById('minimapCanvas');
    const container = document.getElementById('screenVideoContainer');
    const screenVid = document.getElementById('screenPreview');
    const stopBtn = document.getElementById('stopScreenBtn');
    const regionInfo = document.getElementById('regionInfo');

    canvas.style.display = 'none';
    document.getElementById('testImagesArea').classList.remove('show');
    if (typeof screenAutoRunning !== 'undefined' && screenAutoRunning) screenAutoRunning = false;

    container.style.display = '';
    stopBtn.style.display = '';
    regionInfo.style.display = '';

    screenVideoEl = screenVid;
    screenVid.srcObject = screenStream;

    offscreenVideoEl = document.getElementById('screenOffscreen');
    offscreenVideoEl.srcObject = screenStream;
    offscreenVideoEl.onloadedmetadata = () => {
        cachedVideoW = offscreenVideoEl.videoWidth;
        cachedVideoH = offscreenVideoEl.videoHeight;
        initRegionBox(screenVid);
        setupRegionDrag(screenVid);
    };

    screenStream.getVideoTracks()[0].onended = () => stopScreenCapture();
    log('🖥️ 屏幕捕获已开始 — 请拖动蓝色选框框选小地图区域');
}

function stopScreenCapture() {
    if (screenAutoId) { cancelAnimationFrame(screenAutoId); screenAutoId = null; }
    screenRunning = false;
    if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
    if (screenVideoEl) screenVideoEl.srcObject = null;
    if (offscreenVideoEl) { offscreenVideoEl.srcObject = null; offscreenVideoEl = null; }
    document.getElementById('screenVideoContainer').style.display = 'none';
    document.getElementById('stopScreenBtn').style.display = 'none';
    document.getElementById('regionInfo').style.display = 'none';
    setMode('file');
    log('⏹ 屏幕捕获已停止');
}

function initRegionBox(videoEl) {
    const overlay = document.getElementById('regionOverlay');
    const box = document.getElementById('regionBox');
    function updateCircleSize() {
        const rect = videoEl.getBoundingClientRect();
        overlay.style.width = rect.width + 'px'; overlay.style.height = rect.height + 'px';
        const size = Math.min(rect.width, rect.height);
        box.style.left  = (selCircle.cx * rect.width - selCircle.r * size) + 'px';
        box.style.top   = (selCircle.cy * rect.height - selCircle.r * size) + 'px';
        const diameter = selCircle.r * size * 2;
        box.style.width = diameter + 'px'; box.style.height = diameter + 'px';
        const realCX = Math.round(selCircle.cx * videoEl.videoWidth);
        const realCY = Math.round(selCircle.cy * videoEl.videoHeight);
        const realR  = Math.round(selCircle.r * Math.min(videoEl.videoWidth, videoEl.videoHeight));
        document.getElementById('regionInfo').textContent =
            `圆形选区: 中心(${realCX}, ${realCY}) 半径${realR}px [${videoEl.videoWidth}x${videoEl.videoHeight}]`;
    }
    updateCircleSize();
    window.__updateRegionBox = updateCircleSize;
}

function setupRegionDrag(videoEl) {
    const box = document.getElementById('regionBox');
    const overlay = document.getElementById('regionOverlay');
    const handle = box.querySelector('.region-handle');
    function getPos(e) { const rect = overlay.getBoundingClientRect(); return { x: e.clientX - rect.left, y: e.clientY - rect.top }; }
    function onDown(type, e) {
        e.preventDefault(); e.stopPropagation();
        dragState = { active: true, type, startX: getPos(e).x, startY: getPos(e).y, startCircle: { ...selCircle } };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    }
    function onMove(e) {
        if (!dragState.active) return;
        const p = getPos(e), rect = overlay.getBoundingClientRect(), base = Math.min(rect.width, rect.height);
        const dx = (p.x - dragState.startX) / base, dy = (p.y - dragState.startY) / base, sc = dragState.startCircle;
        if (dragState.type === 'move') { selCircle.cx = clamp(sc.cx+dx,0,1); selCircle.cy = clamp(sc.cy+dy,0,1); }
        else { const maxR=Math.max(sc.cx,1-sc.cx,sc.cy,1-sc.cy); selCircle.r = clamp(sc.r+dx,0.03,Math.min(0.49,maxR)); }
        window.__updateRegionBox && window.__updateRegionBox();
    }
    function onUp() { dragState.active=false; document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
    box.addEventListener('mousedown',(e)=>onDown('move',e));
    handle&&handle.addEventListener('mousedown',(e)=>onDown('resize',e));
    box.addEventListener('touchstart',(e)=>onDown('move',e.touches[0]),{passive:false});
    handle&&handle.addEventListener('touchstart',(e)=>onDown('resize',e.touches[0]),{passive:false});
    document.addEventListener('touchmove',(e)=>{if(dragState.active&&e.touches[0])onMove(e.touches[0]);},{passive:false});
    document.addEventListener('touchend',onUp);
    box.addEventListener('dblclick',()=>{if(typeof toggleScreenAutoTrack==='function')toggleScreenAutoTrack();});
    videoEl.addEventListener('resize',()=>{setTimeout(()=>window.__updateRegionBox&&window.__updateRegionBox(),100)});
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

let screenSending = false;

async function captureAndSendScreenFrame() {
    if (!screenStream || screenSending) return;
    screenSending = true;
    const vid = (offscreenVideoEl && offscreenVideoEl.videoWidth) ? offscreenVideoEl : screenVideoEl;
    if (!vid) { screenSending=false; return; }
    const vw = vid.videoWidth||cachedVideoW, vh = vid.videoHeight||cachedVideoH;
    if (!vw || !vh) { screenSending=false; return; }
    const baseSize=Math.min(vw,vh), cx=selCircle.cx*vw, cy=selCircle.cy*vh, r=selCircle.r*baseSize;
    const size=Math.max(10,Math.round(r*2)), rx=Math.round(cx-r), ry=Math.round(cy-r);
    const tmpC=document.createElement('canvas'); tmpC.width=size; tmpC.height=size;
    const ctx=tmpC.getContext('2d');
    ctx.beginPath(); ctx.arc(size/2,size/2,size/2,0,Math.PI*2); ctx.closePath(); ctx.clip();
    ctx.drawImage(vid,rx,ry,size,size,0,0,size,size);
    currentImageData = tmpC.toDataURL('image/jpeg',0.80);
    try { await sendAndDisplay(currentImageData); } catch(e) { console.error('识别出错:',e); }
    finally { screenSending=false; }
}

let screenAutoRunning = false;
function toggleScreenAutoTrack() {
    screenAutoRunning=!screenAutoRunning;
    const btn=document.getElementById('stopScreenBtn');
    if(screenAutoRunning){ btn.textContent='⏸ 暂停追踪'; log(`🔄 屏幕自动追踪已开启 (${currentAlgo==='sift'?'~20fps':'~5fps'})`); runScreenAutoLoop(); }
    else{ btn.textContent='⏹ 停止捕获'; log('⏸ 屏幕自动追踪已暂停'); screenSending=false; }
}
function runScreenAutoLoop(){
    if(!screenAutoRunning||currentMode!=='screen')return;
    captureAndSendScreenFrame();
    const interval=currentAlgo==='sift'?50:200;
    screenAutoId=setTimeout(()=>requestAnimationFrame(runScreenAutoLoop),interval);
}

// ========== 文件模式 ==========

async function setMode(mode) {
    currentMode=mode;
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('modeFile').classList.add('active');
    document.getElementById('screenVideoContainer').style.display='none';
    document.getElementById('stopScreenBtn').style.display='none';
    document.getElementById('regionInfo').style.display='none';
    if(typeof screenAutoRunning!=='undefined'&&screenAutoRunning&&currentMode!=='screen')screenAutoRunning=false;
    document.getElementById('minimapCanvas').style.display='block';
    document.getElementById('testImagesArea').classList.add('show');
}

document.getElementById('fileInput').addEventListener('change', function(e){
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
        const img=new Image();
        img.onload=()=>{
            const cvs=document.getElementById('minimapCanvas'),ctx=cvs.getContext('2d');
            ctx.clearRect(0,0,300,300);
            const s=Math.min(300/img.width,300/img.height),w=img.width*s,h=img.height*s;
            ctx.drawImage(img,(300-w)/2,(300-h)/2,w,h);
            currentImageData=cvs.toDataURL('image/png');
            log(`已加载图片: ${img.width}x${img.height}`);
        }; img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
});

async function sendAndDisplay(imageData) {
    const response = await fetch('/api/upload_minimap', {
        method:'POST',
        body: JSON.stringify({ image:imageData }),
        headers:{'Content-Type':'application/json'}
    });
    let result;
    if(!response.ok){
        const blob=await(await fetch(imageData)).blob();
        const fd=new FormData(); fd.append('image',blob,'minimap.png');
        result=await(await fetch('/api/upload_minimap',{method:'POST',body:fd})).json();
    } else result=await response.json();

    if(result.image){
        const ri=document.getElementById('resultImg');
        ri.src='data:image/png;base64,'+result.image;
        if(pipActive) syncPiPNow();
    }
    if(result.status){
        updateStatus(result.status);
        log(`分析完成 | ${result.status.found?'✅ 找到位置':'❌ 未找到'} (${result.status.matches} 匹配点)`);
    } else log('分析完成，但未返回状态信息');
}

async function processImage() {
    if(currentMode==='screen'){toggleScreenAutoTrack();return;}
    let dataToSend=currentImageData;
    if(!dataToSend){
        const cvs=document.getElementById('minimapCanvas');
        if(cvs&&cvs.style.display!=='none') dataToSend=cvs.toDataURL('image/png');
    }
    if(!dataToSend){log('请先上传或选择小地图！');return;}
    log(`正在 ${currentAlgo==='sift'?'SIFT':'LoFTR AI'} 分析...`);
    try{await sendAndDisplay(dataToSend);}catch(err){log('错误: '+err.message);console.error(err);}
}

// ========== 测试图片 ==========
let testImages=[], selectedTestImg=null;
async function loadTestImages(){
    try{
        testImages=await(await fetch('/api/test_images')).json();
        const grid=document.getElementById('testGrid');grid.innerHTML='';
        testImages.forEach(src=>{
            const img=document.createElement('img');img.src=src;img.className='test-item';img.title=src;
            img.onclick=()=>selectTestImage(img,src);grid.appendChild(img);
        });
        if(testImages.length>0){document.getElementById('testImagesArea').classList.add('show');log(`已加载 ${testImages.length} 张测试图片`);}
    }catch(e){console.log('无测试图片或加载失败:',e.message);}
}
function selectTestImage(el,src){
    document.querySelectorAll('.test-item').forEach(i=>i.classList.remove('selected'));el.classList.add('selected');
    const img=new Image();
    img.onload=()=>{
        const cvs=document.getElementById('minimapCanvas'),ctx=cvs.getContext('2d');
        ctx.clearRect(0,0,300,300);
        const s=Math.min(300/img.width,300/img.height),w=img.width*s,h=img.height*s;
        ctx.drawImage(img,(300-w)/2,(300-h)/2,w,h);
        currentImageData=cvs.toDataURL('image/png');selectedTestImg=src;
        log(`已选择测试图: ${src} (${img.width}x${img.height})`);
    };img.src=src;}
loadTestImages();

function updateStatus(status){
    const stateEl=document.getElementById('statusState'),foundEl=document.getElementById('statusFound');
    const modeEl=document.getElementById('statusMode');
    if(status.mode){modeEl.textContent=status.mode.toUpperCase();modeEl.style.color=status.mode==='sift'?'#ffa726':'#00d4ff';}
    let stateText='--';
    if(status.mode==='sift'){
        if(status.state==='INERTIAL')stateText='惯性导航';
        else if(status.state==='FOUND')stateText='SIFT 追踪';
        else stateText='SIFT 搜索';
    }else{stateText=status.state==='GLOBAL_SCAN'?'全局扫描':'局部追踪';}
    stateEl.textContent=stateText;
    stateEl.className='status-value '+(status.mode==='sift'?'state-local':(status.state==='GLOBAL_SCAN'?'state-global':'state-local'));
    document.getElementById('statusX').textContent=status.position.x;
    document.getElementById('statusY').textContent=status.position.y;
    foundEl.textContent=status.found?'✅ 是':'❌ 否';
    foundEl.className='status-value '+(status.found?'found-yes':'found-no');
    document.getElementById('statusMatches').textContent=status.matches;
}

log('系统就绪，请选择小地图输入方式');
checkAvailableEngines();

async function checkAvailableEngines(){
    try{
        const tr=await fetch('/api/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'loftr'})});
        const tResult=await tr.json();
        if(!tResult.success){document.getElementById('algoLoftr').style.display='none';log('⚠ SIFT-only 模式：LoFTR 不可用');}
        else{await fetch('/api/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'sift'})});}
    }catch(e){console.log('引擎检测跳过:',e.message);}
}

// ========== 画中画 (Document PiP 定制 UI) ==========
let pipActive = false;
let pipUpdateTimer = null;
let pipWindow = null;       // Document PiP 窗口引用
let pipMode = '';           // 'document' | 'video'

async function togglePiP() {
    if (pipActive) { await exitPiP(); } else { await enterPiP(); }
}

async function enterPiP() {
    const ri = document.getElementById('resultImg');
    const btn = document.getElementById('pipBtn');

    const hasDocPIP = !!window.documentPictureInPictureEnabled;
    const hasVidPIP = !!document.pictureInPictureEnabled;

    if (!hasDocPIP && !hasVidPIP) {
        alert('您的浏览器不支持画中画，请使用 Chrome/Edge 116+'); return;
    }
    if (!ri.src || (!ri.src.startsWith('data:') && !ri.src.startsWith('http'))) {
        log('请先分析一张图片再开启悬浮窗！'); return;
    }

    try {
        if (hasDocPIP) { await enterDocumentPiP(); pipMode = 'document'; }
        else { await enterVideoPiP(); pipMode = 'video'; }
        pipActive = true;
        btn.classList.add('active');
        btn.textContent = '✅ 关闭悬浮窗';
        startPiPRefresh();
        log(`🖼️ 悬浮窗已开启 (${pipMode === 'document' ? '定制 UI' : '视频模式'})`);
    } catch(e) { console.error('PiP 失败:', e); alert('画中画失败: ' + e.message); }
}

    pipWindow.document.write(`<html><head><style>

</style></head><body>
<div class="header"><span class="icon">⚓</span><span class="title">地图实时追踪</span></div>
<div class="map-wrap"><img id="pipMapImg"/></div>
<div class="status-bar">
<div class="stat-item"><div class="stat-label">X</div><div class="stat-value coord-x" id="pipX">--</div></div>
<div class="stat-item"><div class="stat-label">Y</div><div class="stat-value coord-y" id="pipY">--</div></div>
<div class="stat-item"><div class="stat-label">状态</div><div class="stat-value state-ok" id="pipState">--</div></div>
</div>

<div class="footer">Document Picture-in-Picture · 实时跟随主页面</div>

    pipWindow.document.close();

    // 绑定透明度滑块
    const opSlider = pipWindow.document.getElementById('pipOpacity');
    const opVal = pipWindow.document.getElementById('pipOpacityVal');
    if (opSlider) {
        opSlider.addEventListener('input', () => {
            const v = opSlider.value;
            opVal.textContent = v + '%';
            pipWindow.document.body.style.opacity = v / 100;
        });
    }
    pipWindow.document.body.style.opacity = 0.95;

    syncToDocPiP();

// 同步数据 → Document PiP 窗口
function syncToDocPiP() {
    if (pipMode !== 'document' || !pipWindow || pipWindow.closed) return;
    const imgEl = pipWindow.document.getElementById('pipMapImg');
    if (imgEl) imgEl.src = document.getElementById('resultImg').src;
    const xEl = pipWindow.document.getElementById('pipX');
    const yEl = pipWindow.document.getElementById('pipY');
    const sEl = pipWindow.document.getElementById('pipState');
    if (xEl) xEl.textContent = document.getElementById('statusX').textContent;
    if (yEl) yEl.textContent = document.getElementById('statusY').textContent;
    if (sEl) {
        const st = document.getElementById('statusState')?.textContent?.trim();
        sEl.textContent = st || '--';
        sEl.className = 'stat-value ' + (
            !st ? 'state-ok' :
            st.includes('追踪') || st.includes('定位') || st.includes('惯性') ? 'state-ok' :
            st.includes('搜索') || st.includes('扫描') ? 'state-warn' : 'state-err'
        );
    }
}

// ---- Video PiP fallback（旧浏览器）----
const _pv = document.getElementById('pipVideo'), _pc = document.getElementById('pipCanvas');
let _vidInitDone = false;

async function enterVideoPiP() {
    if (!_vidInitDone) { _pc.width = 400; _pc.height = 400; _vidInitDone = true; }
    const ri = document.getElementById('resultImg'), ctx = _pc.getContext('2d');
    if (ri.naturalWidth && ri.naturalHeight) {
        const sc = Math.min(400/ri.naturalWidth, 400/ri.naturalHeight);
        ctx.drawImage(ri, (400-ri.naturalWidth*sc)/2, (400-ri.naturalHeight*sc)/2, ri.naturalWidth*sc, ri.naturalHeight*sc);
    }
    _pv.srcObject = _pc.captureStream(10);
    await _pv.play();
    await _pv.requestPictureInPicture();
    _pv.addEventListener('leavepictureinpicture', onPiPLEave, { once: true });
}

// 统一刷新入口（根据当前模式选择同步方式）
function syncPiPNow() {
    if (pipMode === 'document') syncToDocPiP();
    else drawVideoPiPCanvas();
}

function drawVideoPiPCanvas() {
    const ri = document.getElementById('resultImg'), ctx = _pc.getContext('2d');
    if (ri.naturalWidth && ri.naturalHeight) {
        const sc = Math.min(400/ri.naturalWidth, 400/ri.naturalHeight);
        ctx.drawImage(ri, (400-ri.naturalWidth*sc)/2, (400-ri.naturalHeight*sc)/2, ri.naturalWidth*sc, ri.naturalHeight*sc);
    }
}

function startPiPRefresh() {
    stopPiPRefresh();
    pipUpdateTimer = setInterval(() => {
        if (!pipActive) return;
        syncPiPNow();
    }, 500);
}

function stopPiPRefresh() {
    if (pipUpdateTimer) { clearInterval(pipUpdateTimer); pipUpdateTimer = null; }
}

async function exitPiP() {
    const btn = document.getElementById('pipBtn');
    stopPiPRefresh();
    if (pipMode === 'document') {
        // Document PiP 窗口由用户手动关闭，无需额外操作
    } else if (_pv && document.pictureInPictureElement === _pv) {
        try { await document.exitPictureInPicture(); } catch(e) {}
    }
    pipActive = false;
    pipWindow = null;
    pipMode = '';
    btn.classList.remove('active');
    btn.textContent = '🖼️ 悬浮窗';
}

function onPiPLEave() {
    pipActive = false;
    stopPiPRefresh();
    const btn = document.getElementById('pipBtn');
    if (btn) { btn.classList.remove('active'); btn.textContent = '🖼️ 悬浮窗'; }
    log('🖼️ 悬浮窗已关闭');
}
