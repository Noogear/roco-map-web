<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能雷达跟点</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            font-size: 1.5em;
            margin-bottom: 16px;
            color: #00d4ff;
        }
        .container {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            width: 100%;
            max-width: min(80vmin, 760px);
        }
        .panel-title {
            font-size: 1em;
            color: #888;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .preview-area {
            position: relative;
        }
        canvas, img {
            border-radius: 8px;
            display: block;
            background: #2b2b2b;
        }
        #minimapCanvas {
            cursor: crosshair;
            width: 300px;
            height: 300px;
            object-fit: contain;
        }
        #resultImg {
            width: 100%;
            height: auto;
            max-width: min(80vmin, 700px);
            aspect-ratio: 1 / 1;
            object-fit: contain;
        }
        .status-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }
        .status-item {
            background: #0f3460;
            padding: 10px 14px;
            border-radius: 8px;
            text-align: center;
        }
        .status-label { font-size: 0.75em; color: #999; }
        .status-value { font-size: 1.1em; font-weight: bold; margin-top: 4px; }
        .state-global { color: #ffa726; }
        .state-local { color: #66bb6a; }
        .state-lost { color: #ef5350; }
        .found-yes { color: #66bb6a; }
        .found-no { color: #ef5350; }
        .lock-on { color: #4caf50; font-weight:bold; }
        .lock-off { color: #666; }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-primary:hover { background: #00b8e6; transform: translateY(-1px); }
        .btn-secondary { background: #333; color: #fff; border: 1px solid #555; }
        .btn-secondary:hover { background: #444; }
        .btn-danger { background: #e53935; color: #fff; }
        .btn-danger:hover { background: #c62828; }
        .btn-pip { background: #7c4dff; color: #fff; border: 1px solid #b388ff; }
        .btn-pip:hover { background: #651fff; transform: translateY(-1px); }
        .btn-pip.active { background: #00e676; color: #000; border-color: #00e676; }
        .btn-watch { background: #e91e63; color: #fff; border: 1px solid #f48fb1; }
        .btn-watch:hover { background: #c2185b; }
        .btn-watch.active { background: #00e676; color: #000; border-color: #00e676; }
        .btn-lock { background: #555; color: #ccc; border: 1px solid #777; cursor: not-allowed; opacity: 0.5; }
        .btn-lock.ready { background: #ff9800; color: #000; border: 1px solid #ffb74d; cursor: pointer; opacity: 1; }
        .btn-lock.ready:hover { background: #f57c00; transform: translateY(-1px); }
        .btn-lock.active { background: #4caf50; color: #fff; border: 1px solid #81c784; cursor: pointer; opacity: 1; animation: lockPulse 2s infinite; }
        .btn-lock.active:hover { background: #388e3c; }
        .btn-reset { background: #607d8b; color: #fff; border: 1px solid #90a4ae; cursor: pointer; }
        /* 状态指示灯 */
        .status-dot {
            display: inline-block;
            width: 14px; height: 14px;
            border-radius: 50%;
            transition: background-color 0.3s, box-shadow 0.3s;
            flex-shrink: 0;
        }
        .dot-green  { background: #4caf50; box-shadow: 0 0 6px rgba(76,175,80,0.6); }
        .dot-yellow { background: #ff9800; box-shadow: 0 0 6px rgba(255,152,0,0.6); animation: dotBlink 0.8s infinite; }
        .dot-red    { background: #f44336; box-shadow: 0 0 6px rgba(244,67,54,0.5); animation: dotBlink 0.4s infinite; }
        @keyframes dotBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status-dot-wrap {
            display: flex; align-items: center; gap: 8px;
        }
        .status-dot-label { font-size: 12px; color: #aaa; }
        .btn-reset:hover { background: #455a64; transform: translateY(-1px); }
        .btn-reset:active { background: #37474f; }
        @keyframes lockPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(76, 175, 80, 0); }
        }

        /* 观看模式 */
        .watch-mode .float-body > .mode-toggle:first-of-type,
        .watch-mode .float-body > .preview-area,
        .watch-mode .float-body > .region-info,
        .watch-mode .float-body > .btn-row,
        .watch-mode .float-body > .test-images { display: none !important; }
        .watch-badge {
            display: none;
            text-align: center;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(233, 30, 99, 0.15);
            border: 1px solid #e91e63;
            border-radius: 8px;
            font-size: 0.85em;
            color: #f48fb1;
        }
        .watch-badge.show { display: block; }

        input[type="file"] { display: none; }
        label.file-label {
            display: inline-block;
            padding: 10px 20px;
            background: #5c6bc0;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        label.file-label:hover { background: #3f51b5; }

        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .mode-btn {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            background: #222;
            color: #aaa;
            border: 1px solid #444;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background: #00d4ff;
            color: #000;
            border-color: #00d4ff;
        }

        /* 测试图片选择器 */
        .test-images {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #333;
        }
        .test-images.show { display: block; }
        .test-label {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 8px;
        }
        .test-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
        .test-item {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .test-item:hover { border-color: #00d4ff; }
        .test-item.selected { border-color: #66bb6a; }

        /* 悬浮输入面板 */
        .float-panel {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
        }
        .float-toggle {
            background: #16213e;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 18px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s;
            box-shadow: 0 4px 16px rgba(0,212,255,0.2);
            user-select: none;
            white-space: nowrap;
        }
        .float-toggle:hover { background: #1a3a5c; transform: scale(1.03); }
        .float-toggle .arrow { transition: transform 0.3s; font-size: 0.8em; }
        .float-toggle.expanded .arrow { transform: rotate(180deg); }
        .float-body {
            display: none;
            margin-top: 10px;
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 520px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .float-body.show { display: block; animation: fadeSlideIn 0.2s ease; }
        @keyframes fadeSlideIn { from{opacity:0;transform:translateY(-8px);} to{opacity:1;transform:translateY(0);} }

        /* 屏幕捕获 & 圆形选区 */
        #screenVideoContainer {
            position: relative;
            display: inline-block;
        }
        #screenPreview {
            width: 480px;
            height: 270px;
            object-fit: contain;
            border-radius: 8px;
            background: #111;
        }
        .region-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .region-box {
            position: absolute;
            border: 2px dashed #00d4ff;
            background: rgba(0, 212, 255, 0.08);
            border-radius: 50%;
            cursor: move;
            pointer-events: auto;
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.35);
            user-select: none;
        }
        .region-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #00d4ff;
            border: 2px solid #fff;
            border-radius: 50%;
            right: -6px;
            top: 50%;
            margin-top: -6px;
            cursor: ew-resize;
        }

        .region-info {
            font-size: 0.75em;
            color: #00d4ff;
            margin-top: 4px;
            font-family: monospace;
            white-space: nowrap;
        }

        #logArea {
            margin-top: 16px;
            background: #0a0a15;
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.8em;
            color: #0f0;
            max-height: 150px;
            overflow-y: auto;
            width: 100%;
        }

        /* 原生PiP专用画布与视频 */
        #pipCanvas, #pipVideo {
            position: fixed;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
        }

        @media (max-width: 900px) {
            #resultImg { width: 350px; height: 350px; }
        }
    </style>
</head>
<body>

    <!-- 识别模式切换 -->
    <div class="mode-toggle" id="algoModeToggle" style="display:none;">
        <span style="color:#888; font-size:0.85em; margin-right:8px;">识别引擎:</span>
        <button class="mode-btn active" id="algoSift" onclick="switchAlgo('sift')">⚡ SIFT (快速)</button>
        <button class="mode-btn" id="algoLoftr" onclick="switchAlgo('loftr')">🧠 LoFTR (AI)</button>
    </div>

    <div class="mode-toggle" style="display:none;">
        <button class="mode-btn active" id="modeFile" data-conn-mode="file" onclick="setMode('file')">📁 文件上传</button>
        <button class="mode-btn" id="modeScreen" data-conn-mode="screen" onclick="startScreenCapture()">🖥️ 屏幕捕获</button>
    </div>

    <div class="container">
        <!-- 右侧：结果输出（独占） -->
        <div class="panel" style="max-width:700px;">
            <div class="panel-title" style="display:none;">🗺️ 地图追踪结果</div>
            <div class="preview-area">
                <img id="resultImg" src="" alt="等待分析...">
            </div>
            <div class="status-bar">
                <div class="status-item" style="display:none;">
                    <div class="status-label">引擎</div>
                    <div class="status-value" id="statusMode" style="color:#00d4ff;">SIFT</div>
                </div>
                <div class="status-item" style="display:none;">
                    <div class="status-label">状态</div>
                    <div class="status-value">
                        <div class="status-dot-wrap">
                            <span id="statusDot" class="status-dot dot-green" title="正常"></span>
                            <span id="statusDotLabel" class="status-dot-label">--</span>
                        </div>
                    </div>
                </div>
                <div class="status-item">
                    <div class="status-label">坐标 X</div>
                    <div class="status-value" id="statusX">--</div>
                </div>
                <div class="status-item">
                    <div class="status-label">坐标 Y</div>
                    <div class="status-value" id="statusY">--</div>
                </div>
                <div class="status-item" id="lockStatusItem" style="display:none;">
                    <div class="status-label">锁定</div>
                    <div class="status-value" id="statusLock">--</div>
                </div>
                <div class="status-item" id="hybridStatusItem" style="display:none;">
                    <div class="status-label">AI辅助</div>
                    <div class="status-value" id="statusHybrid">--</div>
                </div>
                <div class="status-item" style="display:none;">
                    <div class="status-label">质量</div>
                    <div class="status-value" id="statusQuality">--</div>
                </div>
                <div class="status-item" style="display:none;">
                    <div class="status-label">是否找到</div>
                    <div class="status-value found-no" id="statusFound">--</div>
                </div>
                <div class="status-item" style="display:none;">
                    <div class="status-label">匹配点数</div>
                    <div class="status-value" id="statusMatches">--</div>
                </div>
            </div>
            <div id="logArea"></div>
        </div>
    </div>

    <!-- 悬浮输入面板 -->
    <div class="float-panel" id="floatPanel">
        <div class="float-toggle" id="floatToggle" onclick="toggleFloatPanel()">
            📍 <span class="arrow">▼</span>
        </div>
        <div class="float-body" id="floatBody">
            <!-- 观看模式徽章 -->
            <div class="watch-badge" id="watchBadge">👁️ 观看模式 — 实时接收他人追踪画面</div>

            <!-- 模式切换 -->
            <div class="mode-toggle" style="margin-bottom:12px;">
                <button class="mode-btn active" id="modeFile" data-conn-mode="file" onclick="setMode('file')">📁 文件上传</button>
                <button class="mode-btn" id="modeScreen" data-conn-mode="screen" onclick="startScreenCapture()">🖥️ 屏幕捕获</button>
                <button class="mode-btn" id="modeWatch" data-conn-mode="watch" onclick="enterWatchMode()">👁️ 观看模式</button>
            </div>

            <!-- 预览区 -->
            <div class="preview-area">
                <canvas id="minimapCanvas" width="300" height="300"></canvas>
                <div id="screenVideoContainer" style="display:none;">
                    <video id="screenPreview" autoplay playsinline muted></video>
                    <div class="region-overlay" id="regionOverlay">
                        <div class="region-box" id="regionBox">
                            <div class="region-handle"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="region-info" id="regionInfo" style="display:none;">区域: --</div>

            <!-- 按钮行 -->
            <div class="btn-row">
                <label for="fileInput" class="file-label">📂 上传图片</label>
                <input type="file" id="fileInput" accept="image/*">
                <button class="btn-primary" onclick="processImage()">▶️ 分析定位</button>
                <button id="coordLockBtn" class="btn-lock" onclick="toggleCoordLock()" disabled title="需要先分析定位积累坐标历史">🔒 坐标锁</button>
                <button class="btn-reset" onclick="resetHistory()" title="清空坐标历史，重新开始累积">🗑 重置历史</button>
                <button class="btn-pip" id="pipBtn" data-feature="pip" onclick="toggleNativePiP()">🎠 浏览器画中画</button>
                <button class="btn-danger" onclick="stopScreenCapture()" id="stopScreenBtn" style="display:none;">⏹ 停止捕获</button>
            </div>

            <!-- 测试小地图选择器 -->
            <div class="test-images" id="testImagesArea" style="display:none;">
                <div class="test-label">🧪 测试图片（点击选择）：</div>
                <div class="test-grid" id="testGrid"></div>
            </div>
        </div>
    </div>

    <!-- 离屏视频：始终渲染帧供截图用，不受面板收起影响 -->
    <video id="screenOffscreen" autoplay playsinline muted style="position:fixed;bottom:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1;"></video>
    <!-- 原生PiP专用元素 -->
    <canvas id="pipCanvas"></canvas>
    <video id="pipVideo" autoplay playsinline muted></video>

<script src="js/socket.io.min.js"></script>
<script src="js/tracker-core.js"></script>
<script>
// ========== 初始化 ==========
TC.init({
    logEl: 'logArea',
    onAnalyzeResult: function(result) {
        if (result.image) {
            var ri = document.getElementById('resultImg');
            var imgSrc = result.image;
            if (imgSrc && imgSrc.indexOf('data:') !== 0) {
                imgSrc = 'data:image/jpeg;base64,' + imgSrc;
            }
            ri.src = imgSrc;
            // 自动同步到画中画
            updatePiPCanvas();
        }
        if (result.status) {
            TC.updateStatusDOM(result.status);
            // 更新锁定状态显示
            var lockEl = document.getElementById('statusLock');
            if (lockEl && result.status.coord_lock !== undefined) {
                if (result.status.coord_lock) {
                    lockEl.textContent = '🔒';
                    lockEl.style.color = '#4caf50';
                } else {
                    lockEl.textContent = '未锁';
                    lockEl.style.color = '#888';
                }
                // 同步前端状态
                coordLockEnabled = result.status.coord_lock;
                updateLockButton();
            }
            // 更新混合引擎状态显示
            var hybridEl = document.getElementById('statusHybrid');
            var hybridItem = document.getElementById('hybridStatusItem');
            if (hybridEl && hybridItem && result.status.hybrid !== undefined) {
                if (result.status.hybrid) {
                    hybridItem.style.display = '';
                    if (result.status.hybrid_busy) {
                        hybridEl.textContent = '🔍定位中';
                        hybridEl.style.color = '#ffa726';
                    } else {
                        hybridEl.textContent = '✅就绪';
                        hybridEl.style.color = '#66bb6a';
                    }
                } else {
                    hybridItem.style.display = 'none';
                }
            }
        }
    },
    onScreenStart: function() {
        Array.prototype.forEach.call(document.querySelectorAll('.mode-btn'), function(b) { b.classList.remove('active'); });
        Array.prototype.forEach.call(document.querySelectorAll('[data-conn-mode="screen"]'), function(b) { b.classList.add('active'); });

        var canvas = document.getElementById('minimapCanvas');
        canvas.style.display = 'none';
        document.getElementById('testImagesArea').classList.remove('show');
        if (typeof screenAutoRunning !== 'undefined' && screenAutoRunning) screenAutoRunning = false;

        document.getElementById('screenVideoContainer').style.display = '';
        document.getElementById('stopScreenBtn').style.display = '';
        document.getElementById('regionInfo').style.display = '';
    },
    onScreenStop: function() {
        if (screenAutoId) { clearTimeout(screenAutoId); screenAutoId = null; }
        screenRunning = false;
        document.getElementById('screenVideoContainer').style.display = 'none';
        document.getElementById('stopScreenBtn').style.display = 'none';
        document.getElementById('regionInfo').style.display = 'none';
        setMode('file');
    },
});

TC.log('系统就绪，请选择小地图输入方式');

function setButtonAvailability(buttons, enabled, title) {
    Array.prototype.forEach.call(buttons || [], function(btn) {
        if (!btn) return;
        btn.disabled = !enabled;
        btn.title = title || '';
        if (enabled) {
            btn.style.opacity = '';
            btn.style.cursor = '';
        } else {
            btn.style.opacity = '0.55';
            btn.style.cursor = 'not-allowed';
            btn.classList.remove('active');
        }
    });
}

function getPictureInPictureSupport() {
    var canvas = document.getElementById('pipCanvas');
    var video = document.getElementById('pipVideo');
    var canStream = !!(canvas && typeof canvas.captureStream === 'function');
    var standard = !!(canStream && video && document.pictureInPictureEnabled && typeof video.requestPictureInPicture === 'function');
    var webkit = !!(canStream && video && typeof video.webkitSupportsPresentationMode === 'function' &&
        video.webkitSupportsPresentationMode('picture-in-picture') && typeof video.webkitSetPresentationMode === 'function');
    return {
        any: standard || webkit,
        standard: standard,
        webkit: webkit,
        canStream: canStream,
    };
}

function applyCompatibilityGuards() {
    var report = TC.getConnectionDiagnostics();
    var pipSupport = getPictureInPictureSupport();

    setButtonAvailability(
        document.querySelectorAll('[data-conn-mode="screen"]'),
        report.screenCapture,
        report.screenCapture ? '开始屏幕捕获' : '当前浏览器不支持屏幕捕获，请改用 Chrome / Edge / Firefox 新版'
    );

    setButtonAvailability(
        document.querySelectorAll('[data-conn-mode="watch"]'),
        report.socketIO,
        report.socketIO ? '进入观看模式' : '当前页面未加载 Socket.IO 客户端，无法进入观看模式'
    );

    setButtonAvailability(
        document.querySelectorAll('[data-feature="pip"]'),
        pipSupport.any,
        pipSupport.any ? '打开浏览器画中画' : '当前浏览器不支持原生画中画，主页面仍可正常显示实时画面'
    );
}

function logCompatibilityReport() {
    var report = TC.getConnectionDiagnostics();
    var pipSupport = getPictureInPictureSupport();
    var parts = [
        'HTTP上传' + (report.httpUpload ? '✅' : '❌'),
        'Socket.IO' + (report.socketIO ? '✅' : '❌'),
        '屏幕捕获' + (report.screenCapture ? '✅' : '❌'),
        '观看模式' + (report.socketIO ? '✅' : '❌'),
        '画中画' + (pipSupport.any ? '✅' : '❌')
    ];
    TC.log('兼容检测：' + parts.join(' | '));
}

// ========== 观看模式 ==========
var isWatchMode = false;
async function enterWatchMode() {
    if (!TC.getConnectionDiagnostics().socketIO) {
        TC.log('当前页面未加载 Socket.IO 客户端，无法进入观看模式');
        return;
    }

    var panel = document.getElementById('floatPanel');
    var badge = document.getElementById('watchBadge');
    var btn = document.getElementById('modeWatch');

    if (isWatchMode) {
        // 退出观看模式
        isWatchMode = false;
        panel.classList.remove('watch-mode');
        badge.classList.remove('show');
        btn.classList.remove('active');
        setMode('file');
        TC.log('已退出观看模式');
        return;
    }

    // 进入观看模式
    isWatchMode = true;
    panel.classList.add('watch-mode');
    badge.classList.add('show');
    btn.classList.add('active');

    // 确保WS连接（接收广播画面需要）
    if (!TC.wsConnected) {
        try { await TC.connectWS(); } catch(e) { TC.log('WS连接失败: ' + e.message); return; }
    }

    TC.log('已进入观看模式，正在接收实时追踪画面...');
}

async function startScreenCapture() {
    var ok = await TC.startScreenCapture({
        previewVideo: 'screenPreview',
        offscreenVidId: 'screenOffscreen',
        onMeta: function(vw, vh) { initRegionBox(document.getElementById('screenPreview')); setupRegionDrag(document.getElementById('screenPreview')); }
    });
    if (!ok) return;
}
function stopScreenCapture() { TC.stopScreenCapture(); }

function initRegionBox(videoEl) {
    var overlay = document.getElementById('regionOverlay'), box = document.getElementById('regionBox');
    function updateCircleSize() {
        var rect = videoEl.getBoundingClientRect();
        overlay.style.width = rect.width + 'px'; overlay.style.height = rect.height + 'px';
        var size = Math.min(rect.width, rect.height);
        box.style.left = (TC.selCircle.cx * rect.width - TC.selCircle.r * size) + 'px';
        box.style.top = (TC.selCircle.cy * rect.height - TC.selCircle.r * size) + 'px';
        var d = TC.selCircle.r * size * 2;
        box.style.width = d + 'px'; box.style.height = d + 'px';
        var realCX = Math.round(TC.selCircle.cx * videoEl.videoWidth);
        var realCY = Math.round(TC.selCircle.cy * videoEl.videoHeight);
        var realR = Math.round(TC.selCircle.r * Math.min(videoEl.videoWidth, videoEl.videoHeight));
        document.getElementById('regionInfo').textContent =
            '圆形选区: 中心(' + realCX + ', ' + realCY + ') 半径' + realR + 'px [' + videoEl.videoWidth + 'x' + videoEl.videoHeight + ']';
    }
    updateCircleSize();
    window.__updateRegionBox = updateCircleSize;
}

var dragState = { active: false, type: '', startX: 0, startY: 0, startCircle: null };
var _regionDragSetup = false;  // 防止多次调用累积全局监听器
function setupRegionDrag(videoEl) {
    if (_regionDragSetup) return;
    _regionDragSetup = true;
    var box = document.getElementById('regionBox');
    var overlay = document.getElementById('regionOverlay');
    var handle = box.querySelector('.region-handle');
    function getPos(e) { var rect = overlay.getBoundingClientRect(); return { x: e.clientX - rect.left, y: e.clientY - rect.top }; }
    function onDown(type, e) {
        e.preventDefault(); e.stopPropagation();
        dragState = { active: true, type: type, startX: getPos(e).x, startY: getPos(e).y, startCircle: { cx: TC.selCircle.cx, cy: TC.selCircle.cy, r: TC.selCircle.r } };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    }
    function onMove(e) {
        if (!dragState.active) return;
        var p = getPos(e), rect = overlay.getBoundingClientRect(), base = Math.min(rect.width, rect.height);
        var dx = (p.x - dragState.startX) / base, dy = (p.y - dragState.startY) / base, sc = dragState.startCircle;
        if (dragState.type === 'move') { TC.selCircle.cx = TC.clamp(sc.cx+dx, 0, 1); TC.selCircle.cy = TC.clamp(sc.cy+dy, 0, 1); }
        else { var maxR = Math.max(sc.cx, 1-sc.cx, sc.cy, 1-sc.cy); TC.selCircle.r = TC.clamp(sc.r+dx, 0.03, Math.min(0.49, maxR)); }
        window.__updateRegionBox && window.__updateRegionBox();
    }
    function onUp() { dragState.active=false; document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
    box.addEventListener('mousedown', function(e){ onDown('move',e); });
    if(handle) handle.addEventListener('mousedown', function(e){ onDown('resize',e); });
    box.addEventListener('touchstart', function(e){ onDown('move', e.touches[0]); }, {passive:false});
    if(handle) handle.addEventListener('touchstart', function(e){ onDown('resize', e.touches[0]); }, {passive:false});
    document.addEventListener('touchmove', function(e){ if(dragState.active&&e.touches[0])onMove(e.touches[0]);}, {passive:false});
    document.addEventListener('touchend', onUp);
    box.addEventListener('dblclick', function(){ if(typeof toggleScreenAutoTrack==='function')toggleScreenAutoTrack(); });
    videoEl.addEventListener('resize', function(){ setTimeout(function(){window.__updateRegionBox&&window.__updateRegionBox();}, 10); });
}

// ========== 自动追踪（屏幕捕获模式 - WebSocket 二进制 PNG） ==========
var screenSending = false;
var useWSMode = true;  // 是否使用 WS 二进制通道
var wsReconnectAt = 0; // WS 断线重连限流时间戳
var nullBlobWarnAt = 0; // null blob 警告限流时间戳
async function captureAndSendScreenFrame() {
    if (!TC.isScreenActive || screenSending) return;
    screenSending = true;
    try {
        if (useWSMode && TC.wsConnected) {
            // WS 二进制模式: JPEG 压缩 + 零 base64 开销（上传体积减少约 90%）
            var blob = await TC.captureScreenImgBlob();
            if (blob) {
                S_nullBlobCount = 0;
                await TC.sendViaWS(blob);
            } else {
                // canvas/video 未就绪：限流警告，避免日志刷屏
                S_nullBlobCount = (S_nullBlobCount || 0) + 1;
                if (S_nullBlobCount >= 5 && Date.now() >= nullBlobWarnAt) {
                    nullBlobWarnAt = Date.now() + 5000;
                    TC.log('⚠️ 截图连续失败(' + S_nullBlobCount + '帧)，视频流可能已暂停或 canvas 异常');
                }
            }
        } else if (useWSMode && !TC.wsConnected) {
            // WS 已断开：本帧走 HTTP，后台每3秒尝试重连一次
            var frameData = TC.captureScreenImg();
            if (frameData) { TC.imageData = frameData; await TC.sendAndDisplay(frameData); }
            var now = Date.now();
            if (now >= wsReconnectAt) {
                wsReconnectAt = now + 3000;
                TC.log('🔄 WS 断开，尝试重连...');
                TC.connectWS().then(function() {
                    TC.log('📶 WS 重连成功，恢复二进制模式');
                }).catch(function() {
                    TC.log('⚠️ WS 重连失败，继续 HTTP 模式');
                });
            }
        } else {
            // 已明确回退到 HTTP（useWSMode=false）
            var frameData = TC.captureScreenImg();
            if (frameData) { TC.imageData = frameData; await TC.sendAndDisplay(frameData); }
        }
    } catch(e) { console.error('识别出错:', e); }
    finally { screenSending = false; }
}
var S_nullBlobCount = 0;
var screenAutoRunning = false, screenAutoId = null;
async function toggleScreenAutoTrack() {
    screenAutoRunning = !screenAutoRunning;
    var btn = document.getElementById('stopScreenBtn');
    if (screenAutoRunning) {
        // 保存圆形选区状态到服务器
        await saveCircleState();
        // 尝试连接 WebSocket
        if (useWSMode && !TC.wsConnected) {
            try {
                await TC.connectWS();
                useWSMode = TC.wsConnected;
            } catch(e) {
                TC.log('\u26a0\ufe0f WS 连接失败，回退到 HTTP 模式');
                useWSMode = false;
            }
        }
        var modeLabel = useWSMode ? 'WS\u4e8c\u8fdb\u5236(~20fps)' : 'HTTP(~20fps)';
        btn.textContent='⏸ 暂停追踪'; TC.log('📍 屏幕自动追踪已开启 (' + modeLabel + ')'); runScreenAutoLoop();
    }
    else { btn.textContent='⏹ 停止捕获'; TC.log('⏸ 屏幕自动追踪已暂停'); screenSending = false; }
}
function runScreenAutoLoop() {
    if (!screenAutoRunning || TC.mode !== 'screen') return;
    captureAndSendScreenFrame();
    screenAutoId = setTimeout(function() { requestAnimationFrame(runScreenAutoLoop); }, 100);
}

// ========== 纯原生浏览器画中画 ==========
const pipCanvas = document.getElementById('pipCanvas');
const pipVideo = document.getElementById('pipVideo');
const pipBtn = document.getElementById('pipBtn');
const resultImg = document.getElementById('resultImg');
let pipTimer = null;
let pipEventsBound = false;

// 初始化画布尺寸
pipCanvas.width = 400;
pipCanvas.height = 400;

// 更新画中画画面（双缓冲防闪黑）
var _pipBackBuf = null;
function _getPipBackBuffer() {
    if (!_pipBackBuf) { _pipBackBuf = document.createElement('canvas'); _pipBackBuf.width = 400; _pipBackBuf.height = 400; }
    return _pipBackBuf;
}
function updatePiPCanvas() {
    if (!resultImg.src || !resultImg.naturalWidth || !resultImg.naturalHeight) return;
    const back = _getPipBackBuffer();
    const bctx = back.getContext('2d');
    bctx.clearRect(0, 0, 400, 400);
    const scale = Math.min(400 / resultImg.naturalWidth, 400 / resultImg.naturalHeight);
    const w = resultImg.naturalWidth * scale;
    const h = resultImg.naturalHeight * scale;
    bctx.drawImage(resultImg, (400 - w) / 2, (400 - h) / 2, w, h);

    // 原子式一次性复制到前台画布，避免 captureStream 抓到中间态
    const ctx = pipCanvas.getContext('2d');
    ctx.clearRect(0, 0, 400, 400);
    ctx.drawImage(back, 0, 0);
}

function isNativePiPActive() {
    return document.pictureInPictureElement === pipVideo || pipVideo.webkitPresentationMode === 'picture-in-picture';
}

function stopPiPRefresh() {
    if (pipTimer) clearInterval(pipTimer);
    pipTimer = null;
}

function resetPiPButtonState() {
    pipBtn.classList.remove('active');
    pipBtn.textContent = '🎠 浏览器画中画';
    stopPiPRefresh();
}

function bindPiPEvents() {
    if (pipEventsBound) return;
    pipEventsBound = true;

    pipVideo.addEventListener('leavepictureinpicture', function() {
        resetPiPButtonState();
        TC.log('✅ 原生画中画已关闭');
    });

    pipVideo.addEventListener('webkitpresentationmodechanged', function() {
        if (pipVideo.webkitPresentationMode !== 'picture-in-picture') {
            resetPiPButtonState();
            TC.log('✅ 原生画中画已关闭');
        }
    });
}

async function requestNativePiP() {
    const support = getPictureInPictureSupport();
    if (!support.any) {
        throw new Error('当前浏览器不支持原生画中画');
    }
    if (!support.canStream) {
        throw new Error('当前浏览器不支持画布视频流');
    }

    updatePiPCanvas();
    pipVideo.srcObject = pipCanvas.captureStream(15);
    bindPiPEvents();
    await pipVideo.play();

    if (support.standard) {
        await pipVideo.requestPictureInPicture();
        return 'standard';
    }

    pipVideo.webkitSetPresentationMode('picture-in-picture');
    return 'webkit';
}

async function exitNativePiPMode() {
    if (document.pictureInPictureElement) {
        await document.exitPictureInPicture();
        return;
    }
    if (pipVideo.webkitPresentationMode === 'picture-in-picture') {
        pipVideo.webkitSetPresentationMode('inline');
    }
}

// 切换原生画中画
async function toggleNativePiP() {
    const support = getPictureInPictureSupport();
    if (!support.any) {
        TC.log('当前浏览器不支持原生画中画，可继续直接查看主页面实时画面');
        return;
    }

    // 没有图片则无法开启
    if (!resultImg.src) {
        TC.log('请先分析一张图片再开启画中画！');
        return;
    }

    try {
        if (isNativePiPActive()) {
            // 关闭画中画
            await exitNativePiPMode();
            resetPiPButtonState();
        } else {
            // 开启画中画
            const mode = await requestNativePiP();
            
            // 按钮状态
            pipBtn.classList.add('active');
            pipBtn.textContent = '✅ 关闭画中画';
            
            // 自动刷新画面
            pipTimer = setInterval(updatePiPCanvas, 200);

            TC.log('✅ 原生浏览器画中画已开启' + (mode === 'webkit' ? ' (Safari 兼容模式)' : ''));
        }
    } catch (err) {
        console.error('画中画失败：', err);
        resetPiPButtonState();
        TC.log('❌ 画中画启动失败：' + err.message);
    }
}

// ========== 坐标锁定模式 ==========
var coordLockEnabled = false;
var lockBtn = document.getElementById('coordLockBtn');

async function toggleCoordLock() {
    if (!lockBtn || lockBtn.disabled && !lockBtn.classList.contains('active')) return;

    try {
        var resp = await fetch('/api/coord_lock', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'toggle' })
        });
        var data = await resp.json();
        if (data.success !== undefined) {
            coordLockEnabled = data.enabled;
            updateLockButton();
            TC.log(coordLockEnabled ? '🔒 坐标锁定已开启' : '🔓 坐标锁定已关闭');
        } else {
            TC.log('⚠️ 锁定操作失败: ' + (data.error || '未知错误'));
        }
    } catch(e) {
        TC.log('❌ 锁定请求失败: ' + e.message);
    }
}

function updateLockButton() {
    if (!lockBtn) return;
    if (coordLockEnabled) {
        lockBtn.classList.remove('ready');
        lockBtn.classList.add('active');
        lockBtn.textContent = '🔒 已锁定';
        lockBtn.title = '点击关闭坐标锁定';
    } else {
        lockBtn.classList.remove('active');
        lockBtn.title = '需要先分析定位积累坐标历史';
        // 是否 ready 由 checkLockReadiness 控制
    }
}

function checkLockReadiness() {
    if (!lockBtn) return;
    fetch('/api/coord_lock', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'query' })
    }).then(function(r){ return r.json(); }).then(function(data){
        if (!coordLockEnabled) {
            if (data.can_activate) {
                lockBtn.disabled = false;
                lockBtn.classList.add('ready');
                lockBtn.title = `历史${data.history_count}个，可开启坐标锁`;
                if (!lockBtn.classList.contains('active')) {
                    lockBtn.textContent = '🔒 坐标锁';
                }
            } else {
                lockBtn.disabled = true;
                lockBtn.classList.remove('ready');
                lockBtn.textContent = `🔒 坐标锁(${data.history_count})`;
                lockBtn.title = `还需积累更多坐标 (${data.history_count}/${data.can_activate ? '?' : '...'})`;
            }
        }
    }).catch(function(){});
}

async function resetHistory() {
    if (!confirm('确定要清空所有坐标历史吗？\n坐标锁定将被关闭，需要重新积累历史坐标。')) return;
    
    try {
        const resp = await fetch('/api/reset_history', { method: 'POST' });
        const data = await resp.json();
        if (data.success) {
            TC.log(`🗑 历史已重置 (清除了 ${data.cleared_count} 条记录)`);
            // 同步状态
            coordLockEnabled = false;
            _analyzeCount = 0;
            updateLockButton();
            checkLockReadiness();
        } else {
            TC.log('⚠️ 重置失败: ' + (data.error || '未知错误'));
        }
    } catch(e) {
        TC.log('❌ 重置请求失败: ' + e.message);
    }
}

// 每次分析结果回调时检测锁定按钮是否可用
var _analyzeCount = 0;  // 记录成功匹配的帧数
var _lastStatus = null;

// 直接包装已注册的 onAnalyzeResult 回调（TC.init 已在上方调用）
(function(){
    // 从 TC 内部获取 opts 的方式：通过检查已有回调
    var origCb = null;
    // 我们知道 init 时传了 onAnalyzeResult，直接重新设置来包装它
    var _origLog = TC.log;
    var _origUpdateDOM = TC.updateStatusDOM;
    // 拦截 updateStatusDOM 来触发检查
    TC.updateStatusDOM = function(status, ids) {
        _origUpdateDOM.call(TC, status, ids);
        _lastStatus = status;
        if (status && status.f) {
            _analyzeCount++;
            setTimeout(checkLockReadiness, 50);
        }
    };
})();

// 定期轮询 + 初始化检查
applyCompatibilityGuards();
logCompatibilityReport();
setInterval(checkLockReadiness, 2000);
checkLockReadiness();
